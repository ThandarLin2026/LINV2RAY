<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - X-UI Topup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-white shadow-lg p-4">
            <h2 class="text-xl font-bold mb-6">Admin Panel</h2>
            <nav>
                <a href="#" onclick="showView('topups')" class="block py-2 px-2 hover:bg-gray-100 rounded">📋 Topup Requests</a>
                <a href="#" onclick="showView('bank')" class="block py-2 px-2 hover:bg-gray-100 rounded">🏦 Bank Settings</a>
                <a href="#" onclick="showView('servers')" class="block py-2 px-2 hover:bg-gray-100 rounded">🖥️ X-UI Servers</a>
                <a href="#" onclick="logout()" class="block py-2 px-2 mt-4 text-red-600 hover:bg-gray-100 rounded">🚪 Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-6">
            <!-- Topup Requests View -->
            <div id="topupsView">
                <div class="bg-white rounded shadow p-4">
                    <h2 class="text-xl font-bold mb-4">Topup Requests</h2>
                    <div id="topupsList" class="space-y-3"></div>
                </div>
            </div>

            <!-- Bank Settings View -->
            <div id="bankView" style="display:none;">
                <div class="bg-white rounded shadow p-4">
                    <h2 class="text-xl font-bold mb-4">Bank Information</h2>
                    <input type="text" id="bankName" placeholder="Bank Name" class="w-full border p-2 rounded mb-3">
                    <input type="text" id="holderName" placeholder="Holder Name" class="w-full border p-2 rounded mb-3">
                    <input type="text" id="bankLogo" placeholder="Logo URL (optional)" class="w-full border p-2 rounded mb-3">
                    <button onclick="saveBankInfo()" class="bg-blue-600 text-white px-4 py-2 rounded">Save Changes</button>
                </div>
            </div>

            <!-- X-UI Servers View -->
            <div id="serversView" style="display:none;">
                <div class="bg-white rounded shadow p-4">
                    <h2 class="text-xl font-bold mb-4">X-UI Servers</h2>
                    <div id="serversList" class="space-y-3 mb-4"></div>
                    <button onclick="addServer()" class="bg-green-600 text-white px-4 py-2 rounded">+ Add New Server</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const WORKER_URL = 'https://x-ui.linvpn2026.workers.dev';  // <--- သင်၏ Worker URL ထည့်ပါ
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        // Authorization check
        if (!token || role !== 'admin') {
            window.location.href = '/login.html';
        }

        // Helper fetch with auth
        async function apiFetch(endpoint, options = {}) {
            const res = await fetch(`${WORKER_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });
            if (res.status === 401) {
                localStorage.clear();
                window.location.href = '/login.html';
                throw new Error('Unauthorized');
            }
            return res.json();
        }

        // ==================== TOPUP REQUESTS ====================
        async function loadTopups() {
            const data = await apiFetch('/api/admin/topups');
            const container = document.getElementById('topupsList');
            if (!data.length) {
                container.innerHTML = '<p class="text-gray-500">No requests found.</p>';
                return;
            }
            container.innerHTML = data.map(req => `
                <div class="border rounded p-3 ${req.status === 'pending' ? 'bg-yellow-50' : (req.status === 'approved' ? 'bg-green-50' : 'bg-red-50')}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p><strong>Request ID:</strong> ${req.id}</p>
                            <p><strong>User ID:</strong> ${req.userId}</p>
                            <p><strong>Amount:</strong> ${req.amount} MMK</p>
                            <p><strong>Status:</strong> 
                                <span class="font-semibold">
                                    ${req.status === 'pending' ? '🟡 Pending' : (req.status === 'approved' ? '✅ Approved' : '❌ Canceled')}
                                </span>
                            </p>
                            <p><strong>Submitted:</strong> ${new Date(req.createdAt).toLocaleString()}</p>
                        </div>
                        ${req.imageBase64 ? `<img src="${req.imageBase64}" class="h-20 w-20 object-cover rounded border">` : ''}
                    </div>
                    ${req.status === 'pending' ? `
                        <div class="mt-3 flex gap-2">
                            <button onclick="approveRequest('${req.id}', true)" class="bg-green-500 text-white px-3 py-1 rounded text-sm">✅ Approve</button>
                            <button onclick="approveRequest('${req.id}', false)" class="bg-red-500 text-white px-3 py-1 rounded text-sm">❌ Cancel</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        async function approveRequest(id, approve) {
            await apiFetch('/api/admin/approve-topup', {
                method: 'POST',
                body: JSON.stringify({ requestId: id, approve })
            });
            loadTopups(); // refresh list
        }

        // ==================== BANK SETTINGS ====================
        async function loadBankInfo() {
            const res = await fetch(`${WORKER_URL}/api/admin/bank-info`);
            const info = await res.json();
            document.getElementById('bankName').value = info.bankName || '';
            document.getElementById('holderName').value = info.holderName || '';
            document.getElementById('bankLogo').value = info.bankLogo || '';
        }

        async function saveBankInfo() {
            const data = {
                bankName: document.getElementById('bankName').value,
                holderName: document.getElementById('holderName').value,
                bankLogo: document.getElementById('bankLogo').value
            };
            await apiFetch('/api/admin/bank-info', {
                method: 'POST',
                body: JSON.stringify(data)
            });
            alert('Bank info saved successfully!');
        }

        // ==================== X-UI SERVERS ====================
        async function loadServers() {
            const servers = await apiFetch('/api/admin/servers');
            const container = document.getElementById('serversList');
            if (!servers.length) {
                container.innerHTML = '<p class="text-gray-500">No servers configured. Add one below.</p>';
                return;
            }
            container.innerHTML = servers.map(srv => `
                <div class="border rounded p-3">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                        <input type="text" id="url_${srv.id}" value="${escapeHtml(srv.url)}" placeholder="Server URL" class="border p-1 rounded">
                        <input type="text" id="user_${srv.id}" value="${escapeHtml(srv.username)}" placeholder="Username" class="border p-1 rounded">
                        <input type="password" id="pass_${srv.id}" value="${escapeHtml(srv.password)}" placeholder="Password" class="border p-1 rounded">
                    </div>
                    <div class="mt-2 flex gap-2">
                        <button onclick="updateServer('${srv.id}')" class="bg-yellow-500 text-white px-3 py-1 rounded text-sm">✏️ Update</button>
                        <button onclick="deleteServer('${srv.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateServer(id) {
            const data = {
                url: document.getElementById(`url_${id}`).value,
                username: document.getElementById(`user_${id}`).value,
                password: document.getElementById(`pass_${id}`).value
            };
            await apiFetch(`/api/admin/servers?id=${id}`, {
                method: 'PUT',
                body: JSON.stringify(data)
            });
            alert('Server updated');
            loadServers();
        }

        async function deleteServer(id) {
            if (!confirm('Are you sure you want to delete this server?')) return;
            await apiFetch(`/api/admin/servers?id=${id}`, { method: 'DELETE' });
            alert('Server deleted');
            loadServers();
        }

        async function addServer() {
            await apiFetch('/api/admin/servers', {
                method: 'POST',
                body: JSON.stringify({ url: '', username: '', password: '' })
            });
            alert('New server added');
            loadServers();
        }

        // Helper to escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ==================== VIEW SWITCHING ====================
        function showView(view) {
            document.getElementById('topupsView').style.display = view === 'topups' ? 'block' : 'none';
            document.getElementById('bankView').style.display = view === 'bank' ? 'block' : 'none';
            document.getElementById('serversView').style.display = view === 'servers' ? 'block' : 'none';
            if (view === 'topups') loadTopups();
            if (view === 'bank') loadBankInfo();
            if (view === 'servers') loadServers();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        // Initial load
        showView('topups');
    </script>
</body>
</html>
