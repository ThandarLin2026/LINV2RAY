<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>JK-V2RAY | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, addDoc, collection, deleteDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = { /* same config */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "vipv2raypanel@gmail.com";

        let isAdmin = false;

        async function checkAndLogin() {
            const user = auth.currentUser;
            if (user && user.email === ADMIN_EMAIL) {
                isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
                loadAdminData();
            } else {
                document.getElementById('login-area').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        }

        window.adminLogin = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                if (result.user.email === ADMIN_EMAIL) {
                    await setDoc(doc(db, "users", result.user.uid), { email: result.user.email, role: "admin" }, { merge: true });
                    location.reload();
                } else {
                    await auth.signOut();
                    alert("Only vipv2raypanel@gmail.com can access admin.");
                }
            } catch(e) { console.error(e); }
        };

        onAuthStateChanged(auth, (user) => { checkAndLogin(); });

        function loadAdminData() {
            // load servers, prices, bank, logos, topup_requests
            onSnapshot(collection(db, "servers"), () => renderAdminServerList());
            onSnapshot(collection(db, "topup_requests"), () => loadAdminRequests());
            onSnapshot(doc(db, "settings", "prices"), (docSnap) => { /* fill price inputs */ });
            // ... all admin functions (updateProductPrice, addUnifiedServer, approveTopup, etc)
        }

        window.updateProductPrice = async (product) => { /* same as before */ };
        window.addUnifiedServer = async () => { /* same as before */ };
        window.approveTopup = async (id, authUid, amt) => { /* same as before */ };
        // ... ကျန်တဲ့ admin functions အားလုံး ထည့်ပါ
    </script>
</head>
<body class="bg-slate-950 text-white p-4">
    <div id="login-area" class="hidden max-w-md mx-auto text-center p-10">
        <i class="fas fa-lock text-6xl text-blue-500 mb-4"></i>
        <h2 class="text-xl font-black mb-4">Admin Access Only</h2>
        <button onclick="adminLogin()" class="bg-blue-600 px-8 py-3 rounded-2xl"><i class="fab fa-google mr-2"></i> Sign in with Google</button>
    </div>

    <div id="admin-panel" class="hidden max-w-md mx-auto space-y-6">
        <h1 class="text-2xl font-black text-red-400"><i class="fas fa-user-shield"></i> Admin Panel</h1>
        <a href="user.html" class="text-xs text-slate-400 underline">← Back to User Dashboard</a>
        <!-- Admin UI (price, bank, server, requests) -->
    </div>
</body>
</html>
