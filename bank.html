<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Info Card Generator Pro</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans Myanmar', sans-serif; background: #0f172a; min-height: 100vh; padding: 16px; color: #1a1a1a; }
   .container { max-width: 480px; margin: 0 auto; }
   .header { text-align: center; color: white; margin-bottom: 20px; }
   .header h1 { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
   .header p { opacity: 0.7; font-size: 14px; }
   .controls { background: #1e293b; padding: 20px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 20px; }
   .input-group { margin-bottom: 16px; position: relative; }
   .input-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #94a3b8; }
   .input-group input { width: 100%; padding: 14px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; font-size: 16px; font-family: inherit; color: white; transition: all 0.3s; }
   .input-group input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
   .input-group input[type="file"] { padding: 10px; }
   .input-group input[type="file"]::file-selector-button { background: #334155; border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-right: 10px; }

   .custom-select { position: relative; width: 100%; }
   .select-button {
            width: 100%; padding: 10px 14px; background: #0f172a;
            border: 2px solid #334155; border-radius: 12px;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; color: white; font-size: 16px; transition: all 0.3s;
        }
   .select-button:focus,.custom-select.open.select-button {
            border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
   .select-button img { width: 32px; height: 32px; border-radius: 8px; background: white; padding: 3px; object-fit: contain; flex-shrink: 0; }
   .select-button span { flex-grow: 1; text-align: left; }
   .select-button:after { content: '▾'; font-size: 20px; color: #666; transition: transform 0.3s; }
   .custom-select.open.select-button:after { transform: rotate(180deg); }
   .select-options {
            position: absolute; top: 110%; left: 0; right: 0;
            background: #1e293b; border: 2px solid #334155; border-radius: 12px;
            max-height: 280px; overflow-y: auto; z-index: 10; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
   .select-options.show { display: block; }
   .select-option {
            padding: 12px 14px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; color: white; transition: background 0.2s;
        }
   .select-option:hover { background: rgba(99, 102, 241, 0.2); }
   .select-option img { width: 32px; height: 32px; border-radius: 8px; background: white; padding: 3px; object-fit: contain; flex-shrink: 0; }

   .btn-download { width: 100%; padding: 16px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
   .btn-download:active { transform: scale(0.98); }
   .card-wrapper { perspective: 1000px; }
        #card { width: 100%; aspect-ratio: 1.6 / 1; border-radius: 20px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: space-between; color: white; position: relative; overflow: hidden; transition: background 0.5s ease; }
        #card::before, #card::after { content: ''; position: absolute; border-radius: 50%; background: rgba(255,255,255,0.1); z-index: 0; }
        #card::before { width: 200px; height: 200px; top: -80px; right: -80px; }
        #card::after { width: 150px; height: 150px; bottom: -60px; left: -40px; }
   .card-content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
   .bank-header { display: flex; align-items: center; gap: 12px; }
   .bank-logo { width: 56px; height: 56px; border-radius: 14px; background: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; padding: 4px; }
   .bank-logo img { width: 100%; height: 100%; object-fit: contain; }
   .bank-name-main { font-size: 15px; font-weight: 700; font-family: 'Prompt', sans-serif; line-height: 1.3; }
   .bank-name-sub { font-size: 11px; opacity: 0.8; }
   .card-middle { flex-grow: 1; }
   .card-footer { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; }
   .card-info { flex-grow: 1; }
   .info-item { margin-bottom: 10px; }
   .info-item:last-child { margin-bottom: 0; }
   .label { font-size: 10px; font-weight: 600; opacity: 0.7; letter-spacing: 1px; margin-bottom: 2px; text-transform: uppercase; }
   .value { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Manrope', sans-serif; }
   .name-value { font-size: 16px; }
   .qr-code { width: 70px; height: 70px; background: white; padding: 4px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
   .qr-code img { width: 100%!important; height: 100%!important; object-fit: contain; }
   .card-notice { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; opacity: 0.9; }
   .card-notice img { width: 16px; height: 16px; border-radius: 4px; background: white; padding: 1px; object-fit: contain; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💳 Card Generator Pro</h1>
            <p>Logo + QR Upload ပါတဲ့ မိုက်မိုက်ကတ်</p>
        </div>
        <div class="controls">
            <div class="input-group">
                <label>1. Bank / Wallet ရွေးပါ</label>
                <div class="custom-select" id="customSelect">
                    <div class="select-button" id="selectButton" tabindex="0"></div>
                    <div class="select-options" id="selectOptions"></div>
                </div>
            <div class="input-group">
                <label>2. Account / Phone Number ထည့်ပါ</label>
                <input type="text" id="accNumber" placeholder="ဥပမာ: 072-492-2596" value="072-492-2596">
            </div>
            <div class="input-group">
                <label>3. Account Holder Name ထည့်ပါ</label>
                <input type="text" id="accName" placeholder="ဥပမာ: MR.JUE HTET KHAING" value="MR.JUE HTET KHAING">
            </div>
            <div class="input-group">
                <label>4. QR ပုံ Upload တင်ပါ (မတင်ရင် အကောင့်နံပါတ် QR ထုတ်ပေးမယ်)</label>
                <input type="file" id="qrUpload" accept="image/*">
            </div>
            <button class="btn-download" onclick="downloadCard()">📥 ပုံကို Download လုပ်</button>
        </div>
        <div class="card-wrapper">
            <div id="card">
                <div class="card-content">
                    <div class="bank-header">
                        <div class="bank-logo" id="bankLogo"></div>
                        <div>
                            <div class="bank-name-main" id="bankNameMain"></div>
                            <div class="bank-name-sub" id="bankNameSub"></div>
                        </div>
                    </div>
                    <div class="card-middle"></div>
                    <div class="card-footer">
                        <div class="card-info">
                            <div class="info-item">
                                <div class="label" id="numberLabel">BANK NUMBER</div>
                                <div class="value" id="cardAccNumber"></div>
                            </div>
                            <div class="info-item">
                                <div class="label">ACCOUNT NAME</div>
                                <div class="value name-value" id="cardAccName"></div>
                            </div>
                        </div>
                        <div class="qr-code" id="qrcode"></div>
                    </div>
                    <div class="card-notice">
                        <img id="noticeLogo" src="" alt="logo">
                        <span>ငွေလွှဲပြီးတိုင်းစလစ်ပို့ပေးပါ</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const banks = [
            { id: 'bbl', abbr: 'BBL', en: 'Bangkok Bank', th: 'ธนาคารกรุงเทพ', logo: 'https://raw.githubusercontent.com/ThandarLin2026/Bank/main/bank/bbl.png', gradient: 'linear-gradient(135deg, #1e3a8a, #3b82f6)', label: 'BANK NUMBER' },
            { id: 'kbank', abbr: 'K Bank', en: 'Kasikorn Bank', th: 'ธนาคารกสิกรไทย', logo: 'https://raw.githubusercontent.com/ThandarLin2026/Bank/main/bank/kbank.png', gradient: 'linear-gradient(135deg, #166534, #22c55e)', label: 'BANK NUMBER' },
            { id: 'ktb', abbr: 'KTB', en: 'Krungthai Bank', th: 'ธนาคารกรุงไทย', logo: 'https://raw.githubusercontent.com/ThandarLin2026/Bank/main/bank/ktb.png', gradient: 'linear-gradient(135deg, #0ea5e9, #38bdf8)', label: 'BANK NUMBER' },
            { id: 'gsb', abbr: 'GSB', en: 'Government Savings Bank', th: 'ธนาคารออมสิน', logo: 'https://raw.githubusercontent.com/ThandarLin2026/Bank/main/bank/om.png', gradient: 'linear-gradient(135deg, #b91c1c, #ef4444)', label: 'BANK NUMBER' },
            { id: 'scb', abbr: 'SCB', en: 'Siam Commercial Bank', th: 'ธนาคารไทยพาณิชย์', logo: 'https://raw.githubusercontent.com/ThandarLin2026/Bank/main/bank/scb.png', gradient: 'linear-gradient(135deg, #581c87, #a855f7)', label: 'BANK NUMBER' },
            { id: 'ttb', abbr: 'TTB', en: 'TMBThanachart Bank', th: 'ธนาคารทหารไทยธนชาต', logo: 'https://raw.githubusercontent.com/ThandarLin2026/Bank/main/bank/ttb.png', gradient: 'linear-gradient(135deg, #0369a1, #0ea5e9)', label: 'BANK NUMBER' },
            { id: 'ks', abbr: 'Krungsri', en: 'Krungsri Bank', th: 'ธนาคารกรุงศรีอยุธยา', logo: 'https://raw.githubusercontent.com/ThandarLin2026/Bank/main/bank/ks.png', gradient: 'linear-gradient(135deg, #ca8a04, #facc15)', label: 'BANK NUMBER' },
            { id: 'wave', abbr: 'Wave', en: 'Wave Pay', th: 'เวฟ เพย์', logo: 'https://raw.githubusercontent.com/ThandarLin2026/Bank/main/bank/wave.png', gradient: 'linear-gradient(135deg, #eab308, #fde047)', label: 'PHONE NUMBER' },
            { id: 'kpay', abbr: 'Kpay', en: 'KBZ Pay', th: 'เคบีแซด เพย์', logo: 'https://raw.githubusercontent.com/ThandarLin2026/Bank/main/bank/kpay.png', gradient: 'linear-gradient(135deg, #1d4ed8, #3b82f6)', label: 'PHONE NUMBER' }
        ];

        const customSelect = document.getElementById('customSelect');
        const selectButton = document.getElementById('selectButton');
        const selectOptions = document.getElementById('selectOptions');
        const qrContainer = document.getElementById("qrcode");
        const qrUpload = document.getElementById("qrUpload");
        let selectedBank = banks[0];
        let customQrImage = null;

        function populateDropdown() {
            banks.forEach(bank => {
                const option = document.createElement('div');
                option.className = 'select-option';
                option.innerHTML = `<img src="${bank.logo}" alt="${bank.en}"><span>${bank.en} - ${bank.abbr}</span>`;
                option.addEventListener('click', () => {
                    selectedBank = bank;
                    updateSelectButton();
                    updateCard();
                    selectOptions.classList.remove('show');
                    customSelect.classList.remove('open');
                });
                selectOptions.appendChild(option);
            });
        }

        function updateSelectButton() {
            selectButton.innerHTML = `<img src="${selectedBank.logo}" alt="${selectedBank.en}"><span>${selectedBank.en} - ${selectedBank.abbr}</span>`;
        }

        selectButton.addEventListener('click', () => {
            selectOptions.classList.toggle('show');
            customSelect.classList.toggle('open');
        });

        document.addEventListener('click', (e) => {
            if (!customSelect.contains(e.target)) {
                selectOptions.classList.remove('show');
                customSelect.classList.remove('open');
            }
        });

        function updateCard() {
            const bank = selectedBank;
            document.getElementById('card').style.background = bank.gradient;
            document.getElementById('bankLogo').innerHTML = `<img src="${bank.logo}" alt="${bank.en}">`;
            document.getElementById('noticeLogo').src = bank.logo;
            document.getElementById('bankNameMain').innerText = `${bank.en} - ${bank.abbr}`;
            document.getElementById('bankNameSub').innerText = bank.th;
            document.getElementById('numberLabel').innerText = bank.label;

            const accNumber = document.getElementById('accNumber').value;
            const accName = document.getElementById('accName').value;
            document.getElementById('cardAccNumber').innerText = accNumber;
            document.getElementById('cardAccName').innerText = accName.toUpperCase();

            qrContainer.innerHTML = '';
            if (customQrImage) {
                qrContainer.innerHTML = `<img src="${customQrImage}" alt="QR Code">`;
            } else {
                new QRCode(qrContainer, {
                    text: accNumber || " ", width: 62, height: 62, correctLevel: QRCode.CorrectLevel.H
                });
            }
        }

        qrUpload.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    customQrImage = e.target.result;
                    updateCard();
                };
                reader.readAsDataURL(file);
            } else {
                customQrImage = null;
                updateCard();
            }
        });

        function downloadCard() {
            updateCard();
            html2canvas(document.getElementById('card'), {
                scale: 3, backgroundColor: null, useCORS: true, allowTaint: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `bank-card-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        document.getElementById('accNumber').addEventListener('input', updateCard);
        document.getElementById('accName').addEventListener('input', updateCard);

        populateDropdown();
        updateSelectButton();
        updateCard();
    </script>
</body>
</html>
