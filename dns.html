<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare DNS Dark Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Pyidaungsu:wght@400;700&display=swap');
        
        :root {
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --cf-orange: #f48120;
            --cf-blue: #3b82f6;
        }

        body { 
            font-family: 'Inter', 'Pyidaungsu', sans-serif; 
            background-color: var(--dark-bg); 
            color: #f1f5f9;
        }

        .cf-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .input-cf {
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            width: 100%;
            outline: none;
            color: white;
            transition: border-color 0.2s;
        }

        .input-cf:focus {
            border-color: var(--cf-orange);
            box-shadow: 0 0 0 2px rgba(244, 129, 32, 0.2);
        }

        .btn-cf-primary {
            background-color: var(--cf-orange);
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-cf-primary:hover { 
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        /* Status Pulse Animation */
        .status-pulse {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            position: relative;
        }
        .status-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        .tag-type {
            background: #334155;
            border: 1px solid #475569;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 4px;
            color: #94a3b8;
        }

        /* Proxy Switch Style */
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--cf-orange); }
        input:checked + .slider:before { transform: translateX(16px); }

        .records-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { 
            text-align: left; 
            font-size: 11px; 
            text-transform: uppercase; 
            color: #94a3b8; 
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.5);
        }
        td { 
            padding: 16px; 
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }

        .copy-btn { color: #64748b; cursor: pointer; transition: color 0.2s; }
        .copy-btn:hover { color: var(--cf-orange); }

        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }

        .proxy-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .proxy-on { color: var(--cf-orange); }
        .proxy-off { color: #64748b; }
    </style>
</head>
<body>

    <div id="toast">Copied to clipboard!</div>

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 px-6 h-16 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <i class="fab fa-cloudflare text-orange-500 text-3xl"></i>
            <h1 class="font-bold text-white text-base tracking-tight">DNS Manager</h1>
        </div>
        <div class="flex items-center gap-3">
            <select id="domainSelector" onchange="changeDomain()" class="text-xs font-bold bg-slate-800 text-slate-300 rounded-lg px-3 py-1.5 border border-slate-700 outline-none focus:border-orange-500">
                <option value="linvpn.shop">linvpn.shop</option>
                <option value="linvpn.site">linvpn.site</option>
            </select>
            <button onclick="fetchRecords()" class="bg-slate-800 p-2 rounded-lg border border-slate-700 hover:bg-slate-700 text-slate-400">
                <i id="refreshIcon" class="fas fa-sync-alt text-sm"></i>
            </button>
        </div>
    </header>

    <main class="p-4 max-w-5xl mx-auto space-y-6">
        
        <!-- Record Form Card -->
        <section class="cf-card rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/30">
                <h2 id="formTitle" class="text-xs font-black text-slate-400 uppercase tracking-widest">Add New Record</h2>
                <button onclick="resetForm()" id="cancelBtn" class="hidden text-[11px] text-blue-400 font-bold uppercase hover:underline">Cancel</button>
            </div>
            <div class="p-5 grid grid-cols-1 md:grid-cols-4 gap-5 items-end">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-2 uppercase tracking-tighter">Type</label>
                    <select id="recordType" class="input-cf">
                        <option value="A">A</option>
                        <option value="AAAA">AAAA</option>
                        <option value="CNAME">CNAME</option>
                        <option value="HTTPS">HTTPS</option>
                        <option value="TXT">TXT</option>
                        <option value="SRV">SRV</option>
                        <option value="MX">MX</option>
                        <option value="NS">NS</option>
                        <option value="PTR">PTR</option>
                        <option value="CAA">CAA</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-2 uppercase tracking-tighter">Name (e.g. @)</label>
                    <input type="text" id="recordName" class="input-cf" placeholder="e.g. @">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-2 uppercase tracking-tighter">Content / IP</label>
                    <input type="text" id="recordContent" class="input-cf" placeholder="e.g. 192.0.2.1">
                </div>
                <div class="flex flex-col gap-3">
                    <div class="flex items-center justify-between px-1">
                        <span class="text-[11px] font-bold text-slate-500 uppercase">Proxy Status</span>
                        <label class="switch">
                            <input type="checkbox" id="recordProxy" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <button onclick="saveRecord()" id="saveBtn" class="btn-cf-primary w-full shadow-lg shadow-orange-500/20">Save Record</button>
                </div>
            </div>
        </section>

        <!-- Records Header & Status -->
        <div class="flex items-center justify-between px-2">
            <div class="flex items-center gap-3">
                <div class="status-pulse"></div>
                <div class="flex flex-col">
                    <span id="displayDomain" class="text-sm font-bold text-white tracking-tight">linvpn.shop</span>
                    <span class="text-[10px] text-emerald-500 font-black uppercase tracking-widest">Live Status</span>
                </div>
            </div>
            <div id="recordCount" class="text-[10px] font-bold text-slate-500 bg-slate-800 px-3 py-1 rounded-full border border-slate-700 uppercase tracking-tighter">
                0 Records
            </div>
        </div>

        <!-- Records Table Card -->
        <section class="cf-card rounded-2xl overflow-hidden">
            <div class="records-scroll">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 80px;">Type</th>
                            <th>Name</th>
                            <th>Content</th>
                            <th style="width: 100px;">Proxying</th>
                            <th style="width: 120px; text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="recordsContainer">
                        <tr>
                            <td colspan="5" class="py-20 text-center text-slate-500">
                                <div class="flex flex-col items-center gap-3">
                                    <i class="fas fa-circle-notch fa-spin text-2xl text-orange-500"></i>
                                    <span class="text-sm font-medium">Fetching records...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        const DOMAINS = {
            "linvpn.shop": { zoneId: "4ccdd712231c994e57135420400f7645", token: "cfut_c7CSFTyOqSfdfuwmBUkphsomfNfO0IJATRWLrlBje0177389" },
            "linvpn.site": { zoneId: "8d817d0fa5e946e0e54804c56232accd", token: "cfut_FZUsKXcgjSN6ev43wkmbVHWcYBNV9sdDOS8k7g183feea551" }
        };

        const WORKER_URL = "https://dns-manager.linvpn2026.workers.dev";
        let currentDomain = "linvpn.shop";
        let allRecords = [];

        window.onload = fetchRecords;

        function showToast(text) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function copy(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("Copied to clipboard!");
        }

        function changeDomain() {
            currentDomain = document.getElementById('domainSelector').value;
            document.getElementById('displayDomain').innerText = currentDomain;
            resetForm();
            fetchRecords();
        }

        async function cfFetch(path, method = 'GET', body = null) {
            const config = DOMAINS[currentDomain];
            const url = `${WORKER_URL}/zones/${config.zoneId}${path}`;
            const options = {
                method,
                headers: { 'Authorization': `Bearer ${config.token}`, 'Content-Type': 'application/json' }
            };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(url, options);
            const data = await res.json();
            if (data.success) return data;
            throw new Error(data.errors?.[0]?.message || "API Error");
        }

        async function fetchRecords() {
            const icon = document.getElementById('refreshIcon');
            const container = document.getElementById('recordsContainer');
            const countEl = document.getElementById('recordCount');
            icon.classList.add('fa-spin');
            
            try {
                const data = await cfFetch('/dns_records?per_page=100');
                allRecords = data.result;
                countEl.innerText = `${allRecords.length} Records`;
                
                if (allRecords.length === 0) {
                    container.innerHTML = `<tr><td colspan="5" class="py-20 text-center text-slate-500 italic">No DNS records found.</td></tr>`;
                    return;
                }

                container.innerHTML = allRecords.map(record => `
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td><span class="tag-type">${record.type}</span></td>
                        <td>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-blue-400 truncate max-w-[140px]">${record.name}</span>
                                <i onclick="copy('${record.name}')" class="far fa-copy copy-btn text-[11px]"></i>
                            </div>
                        </td>
                        <td>
                            <div class="text-slate-400 font-mono text-[12px] break-all max-w-[200px]">${record.content}</div>
                        </td>
                        <td>
                            <div class="proxy-badge ${record.proxied ? 'proxy-on' : 'proxy-off'}">
                                <i class="fas fa-cloud text-xs"></i>
                                <span>${record.proxied ? 'Proxied' : 'DNS Only'}</span>
                            </div>
                        </td>
                        <td class="text-right space-x-3">
                            <button onclick="editRecord('${record.id}')" class="text-slate-400 hover:text-white transition-colors"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteRecord('${record.id}')" class="text-slate-500 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                container.innerHTML = `<tr><td colspan="5" class="py-20 text-center text-red-500 font-bold">${err.message}</td></tr>`;
            } finally { icon.classList.remove('fa-spin'); }
        }

        async function saveRecord() {
            const id = document.getElementById('editId').value;
            const payload = {
                type: document.getElementById('recordType').value,
                name: document.getElementById('recordName').value.trim(),
                content: document.getElementById('recordContent').value.trim(),
                proxied: document.getElementById('recordProxy').checked,
                ttl: 1
            };

            if (!payload.name || !payload.content) return alert("ကျေးဇူးပြု၍ Name နှင့် Content ကို ဖြည့်သွင်းပါ။");
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Processing...';

            try {
                if (id) await cfFetch(`/dns_records/${id}`, 'PUT', payload);
                else await cfFetch('/dns_records', 'POST', payload);
                resetForm();
                fetchRecords();
                showToast("Record successfully updated!");
            } catch (err) { alert(err.message); }
            finally { 
                saveBtn.disabled = false;
                saveBtn.innerText = id ? "Update Record" : "Save Record"; 
            }
        }

        function editRecord(id) {
            const record = allRecords.find(r => r.id === id);
            if (!record) return;
            document.getElementById('editId').value = record.id;
            document.getElementById('recordType').value = record.type;
            document.getElementById('recordName').value = record.name;
            document.getElementById('recordContent').value = record.content;
            document.getElementById('recordProxy').checked = record.proxied;
            
            document.getElementById('formTitle').innerText = 'Edit Record';
            document.getElementById('saveBtn').innerText = 'Update Record';
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('recordName').value = '';
            document.getElementById('recordContent').value = '';
            document.getElementById('formTitle').innerText = 'Add New Record';
            document.getElementById('saveBtn').innerText = 'Save Record';
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        async function deleteRecord(id) {
            if (!confirm("ဤ Record ကို ဖျက်ရန် သေချာပါသလား?")) return;
            try {
                await cfFetch(`/dns_records/${id}`, 'DELETE');
                fetchRecords();
                showToast("Record deleted successfully");
            } catch (err) { alert(err.message); }
        }
    </script>
</body>
</html>
