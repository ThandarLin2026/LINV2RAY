```html
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare DNS Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Pyidaungsu:wght@400;700&display=swap');
        
        :root {
            --primary: #f48120;
            --primary-hover: #e67300;
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
        }

        body { 
            font-family: 'Inter', 'Pyidaungsu', sans-serif; 
            background-color: var(--bg-dark);
            color: #f1f5f9;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input, select {
            background-color: #334155 !important;
            border: 1px solid #475569 !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary) !important;
            ring: 2px var(--primary);
        }

        .btn-primary {
            background-color: var(--primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(244, 129, 32, 0.3);
        }

        .hidden-field { display: none; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Navigation Bar -->
    <nav class="border-b border-slate-800 bg-slate-900/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <i class="fab fa-cloudflare text-3xl text-orange-500"></i>
                    <span class="text-xl font-bold tracking-tight">DNS Manager <span class="text-orange-500 text-xs">PRO</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="fetchRecords()" class="text-sm font-medium bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition border border-slate-700 flex items-center gap-2">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pt-8">
        
        <div class="grid lg:grid-cols-12 gap-8">
            
            <!-- Left Column: Config & Form -->
            <div class="lg:col-span-5 space-y-6">
                
                <!-- API Configuration Card -->
                <section class="glass-card rounded-2xl p-6 shadow-xl">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">API Settings</h2>
                        <div class="flex items-center gap-2">
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="saveCredentials" class="sr-only peer" onchange="saveCredentialsToLocal()">
                                <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-500"></div>
                                <span class="ml-2 text-xs font-medium text-slate-400">Auto-Save</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-3 top-3.5 text-slate-500"></i>
                            <input type="email" id="cfEmail" placeholder="Cloudflare Email" class="w-full pl-10 pr-4 py-3 rounded-xl outline-none" oninput="saveCredentialsToLocal()">
                        </div>
                        <div class="relative">
                            <i class="fas fa-key absolute left-3 top-3.5 text-slate-500"></i>
                            <input type="password" id="cfApiKey" placeholder="Global API Key / Token" class="w-full pl-10 pr-4 py-3 rounded-xl outline-none" oninput="saveCredentialsToLocal()">
                        </div>
                        <div class="relative">
                            <i class="fas fa-globe absolute left-3 top-3.5 text-slate-500"></i>
                            <input type="text" id="cfZoneId" placeholder="Zone ID" class="w-full pl-10 pr-4 py-3 rounded-xl outline-none" oninput="saveCredentialsToLocal()">
                        </div>
                    </div>
                </section>

                <!-- Add Record Card -->
                <section class="glass-card rounded-2xl p-6 shadow-xl">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-6">New DNS Record</h2>
                    
                    <form id="dnsForm" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="col-span-1">
                                <label class="block text-xs text-slate-500 mb-1 ml-1">Record Type</label>
                                <select id="recordType" class="w-full px-4 py-3 rounded-xl outline-none" onchange="toggleExtraFields()">
                                    <option value="A">A</option>
                                    <option value="AAAA">AAAA</option>
                                    <option value="CNAME">CNAME</option>
                                    <option value="TXT">TXT</option>
                                    <option value="MX">MX</option>
                                    <option value="NS">NS</option>
                                    <option value="SRV">SRV</option>
                                    <option value="CAA">CAA</option>
                                </select>
                            </div>
                            <div class="col-span-1">
                                <label class="block text-xs text-slate-500 mb-1 ml-1">TTL</label>
                                <select id="recordTTL" class="w-full px-4 py-3 rounded-xl outline-none">
                                    <option value="1">Auto</option>
                                    <option value="60">1 min</option>
                                    <option value="300">5 min</option>
                                    <option value="3600">1 hour</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs text-slate-500 mb-1 ml-1">Name (e.g. @, www)</label>
                            <input type="text" id="recordName" placeholder="Subdomain or @" class="w-full px-4 py-3 rounded-xl outline-none">
                        </div>

                        <div>
                            <label class="block text-xs text-slate-500 mb-1 ml-1">Content (Value)</label>
                            <input type="text" id="recordContent" placeholder="IP Address or Target" class="w-full px-4 py-3 rounded-xl outline-none">
                        </div>

                        <!-- Extra Dynamic Fields -->
                        <div id="extraFields" class="grid grid-cols-2 gap-4 hidden-field">
                            <div id="priorityGroup">
                                <label class="block text-xs text-slate-500 mb-1 ml-1">Priority</label>
                                <input type="number" id="recordPriority" value="10" class="w-full px-4 py-3 rounded-xl outline-none">
                            </div>
                            <div id="srvGroup" class="contents">
                                <div>
                                    <label class="block text-xs text-slate-500 mb-1 ml-1">Port</label>
                                    <input type="number" id="srvPort" value="443" class="w-full px-4 py-3 rounded-xl outline-none">
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center justify-between p-3 bg-slate-800/50 rounded-xl border border-slate-700">
                            <span class="text-sm text-slate-300">Cloudflare Proxy</span>
                            <input type="checkbox" id="recordProxy" class="w-5 h-5 accent-orange-500" checked>
                        </div>

                        <button type="button" onclick="createDNSRecord()" class="btn-primary w-full py-4 rounded-xl text-white font-bold text-lg">
                            <i class="fas fa-plus-circle mr-2"></i> Record သိမ်းမည်
                        </button>
                    </form>
                </section>
            </div>

            <!-- Right Column: Table -->
            <div class="lg:col-span-7">
                <div id="statusMsg" class="hidden mb-4 p-4 rounded-xl text-sm font-medium animate-pulse"></div>
                
                <div class="glass-card rounded-2xl shadow-xl overflow-hidden min-h-[500px]">
                    <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-800/30">
                        <h2 class="text-lg font-bold">DNS Records List</h2>
                        <span id="recordCount" class="bg-blue-500/10 text-blue-400 text-xs px-2 py-1 rounded-full border border-blue-500/20">0 Records</span>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-500 text-xs uppercase tracking-tighter border-b border-slate-800">
                                    <th class="px-6 py-4">Type</th>
                                    <th class="px-6 py-4">Name / Content</th>
                                    <th class="px-6 py-4 text-center">Proxy</th>
                                    <th class="px-6 py-4 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="recordsTableBody" class="divide-y divide-slate-800">
                                <tr>
                                    <td colspan="4" class="px-6 py-20 text-center text-slate-500">
                                        <i class="fas fa-folder-open text-4xl block mb-4 opacity-20"></i>
                                        အချက်အလက်များကို ရယူရန် Refresh ကိုနှိပ်ပါ။
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        window.onload = () => {
            const savedEmail = localStorage.getItem('cf_email');
            const savedKey = localStorage.getItem('cf_api_key');
            const savedZone = localStorage.getItem('cf_zone_id');

            if (savedEmail) document.getElementById('cfEmail').value = savedEmail;
            if (savedKey) document.getElementById('cfApiKey').value = savedKey;
            if (savedZone) document.getElementById('cfZoneId').value = savedZone;
            
            if (savedEmail || savedKey || savedZone) {
                document.getElementById('saveCredentials').checked = true;
            }
        };

        function saveCredentialsToLocal() {
            if (document.getElementById('saveCredentials').checked) {
                localStorage.setItem('cf_email', document.getElementById('cfEmail').value);
                localStorage.setItem('cf_api_key', document.getElementById('cfApiKey').value);
                localStorage.setItem('cf_zone_id', document.getElementById('cfZoneId').value);
            } else {
                localStorage.removeItem('cf_email');
                localStorage.removeItem('cf_api_key');
                localStorage.removeItem('cf_zone_id');
            }
        }

        function toggleExtraFields() {
            const type = document.getElementById('recordType').value;
            const extraFields = document.getElementById('extraFields');
            const priorityGroup = document.getElementById('priorityGroup');
            const srvGroup = document.getElementById('srvGroup');
            const proxyCheckbox = document.getElementById('recordProxy');

            extraFields.style.display = 'none';
            priorityGroup.style.display = 'none';
            srvGroup.style.display = 'none';
            proxyCheckbox.disabled = false;

            if (type === 'MX') {
                extraFields.style.display = 'grid';
                priorityGroup.style.display = 'block';
                proxyCheckbox.checked = false;
                proxyCheckbox.disabled = true;
            } else if (type === 'SRV') {
                extraFields.style.display = 'grid';
                priorityGroup.style.display = 'block';
                srvGroup.style.display = 'contents';
                proxyCheckbox.checked = false;
                proxyCheckbox.disabled = true;
            } else if (['TXT', 'NS', 'CAA'].includes(type)) {
                proxyCheckbox.checked = false;
                proxyCheckbox.disabled = true;
            }
        }

        function showStatus(msg, isError = false) {
            const el = document.getElementById('statusMsg');
            el.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i> ${msg}`;
            el.className = `mb-4 p-4 rounded-xl text-center font-medium ${isError ? 'bg-red-500/10 text-red-400 border border-red-500/20' : 'bg-green-500/10 text-green-400 border border-green-500/20'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        async function fetchRecords() {
            const email = document.getElementById('cfEmail').value;
            const authKey = document.getElementById('cfApiKey').value;
            const zoneId = document.getElementById('cfZoneId').value;

            if (!authKey || !zoneId) {
                showStatus('API Settings ကိုအရင်ဖြည့်ပါ', true);
                return;
            }

            const tbody = document.getElementById('recordsTableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-20 text-center text-orange-400 font-bold"><i class="fas fa-spinner fa-spin mr-2"></i> Records များကိုရယူနေသည်...</td></tr>';

            try {
                const response = await fetch(`https://api.cloudflare.com/client/v4/zones/${zoneId}/dns_records?per_page=100`, {
                    headers: {
                        'X-Auth-Email': email,
                        'X-Auth-Key': authKey,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                if (data.success) {
                    tbody.innerHTML = '';
                    document.getElementById('recordCount').innerText = `${data.result.length} Records`;
                    
                    data.result.forEach(record => {
                        const row = `
                            <tr class="hover:bg-slate-800/40 transition">
                                <td class="px-6 py-4">
                                    <span class="bg-blue-500/10 text-blue-400 px-2.5 py-1 rounded-md text-[10px] font-black border border-blue-500/20 uppercase">${record.type}</span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="font-bold text-slate-200">${record.name}</div>
                                    <div class="text-xs text-slate-500 truncate max-w-[200px]">${record.content}</div>
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <i class="fas fa-cloud ${record.proxied ? 'text-orange-500' : 'text-slate-700'}" title="${record.proxied ? 'Proxied' : 'DNS Only'}"></i>
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <button onclick="deleteRecord('${record.id}')" class="text-slate-500 hover:text-red-500 p-2 transition">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                } else {
                    showStatus(data.errors[0].message, true);
                }
            } catch (err) {
                showStatus('Network Error! CORS Bypass Extension လိုအပ်နိုင်ပါသည်။', true);
            }
        }

        async function createDNSRecord() {
            const email = document.getElementById('cfEmail').value;
            const authKey = document.getElementById('cfApiKey').value;
            const zoneId = document.getElementById('cfZoneId').value;
            const type = document.getElementById('recordType').value;

            const payload = {
                type: type,
                name: document.getElementById('recordName').value,
                content: document.getElementById('recordContent').value,
                ttl: parseInt(document.getElementById('recordTTL').value),
                proxied: document.getElementById('recordProxy').checked
            };

            if (type === 'MX' || type === 'SRV') {
                payload.priority = parseInt(document.getElementById('recordPriority').value);
            }

            try {
                const response = await fetch(`https://api.cloudflare.com/client/v4/zones/${zoneId}/dns_records`, {
                    method: 'POST',
                    headers: {
                        'X-Auth-Email': email,
                        'X-Auth-Key': authKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (data.success) {
                    showStatus('Record အသစ်ကို အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ။');
                    fetchRecords();
                    document.getElementById('recordName').value = '';
                    document.getElementById('recordContent').value = '';
                } else {
                    showStatus(data.errors[0].message, true);
                }
            } catch (err) {
                showStatus('Request ပေးပို့၍မရပါ။', true);
            }
        }

        async function deleteRecord(recordId) {
            if (!confirm('ဤ Record ကိုဖျက်ရန် သေချာပါသလား?')) return;
            const email = document.getElementById('cfEmail').value;
            const authKey = document.getElementById('cfApiKey').value;
            const zoneId = document.getElementById('cfZoneId').value;

            try {
                const response = await fetch(`https://api.cloudflare.com/client/v4/zones/${zoneId}/dns_records/${recordId}`, {
                    method: 'DELETE',
                    headers: {
                        'X-Auth-Email': email,
                        'X-Auth-Key': authKey,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                if (data.success) {
                    showStatus('Record ကို ဖျက်လိုက်ပါပြီ။');
                    fetchRecords();
                } else {
                    showStatus('Error deleting record.', true);
                }
            } catch (err) {
                showStatus('Network error.', true);
            }
        }
    </script>
</body>
</html>

```
