<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Cloudflare DNS Dark Manager</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Pyidaungsu:wght@400;700&display=swap');

        :root {
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --cf-orange: #f48120;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', 'Pyidaungsu', sans-serif;
            background: radial-gradient(circle at top, #172554 0%, var(--dark-bg) 45%);
            color: #f1f5f9;
        }

        .cf-card {
            background: rgba(30, 41, 59, 0.96);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.22);
            backdrop-filter: blur(10px);
        }

        .input-cf {
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            width: 100%;
            outline: none;
            color: white;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }

        .input-cf:focus {
            border-color: var(--cf-orange);
            box-shadow: 0 0 0 3px rgba(244, 129, 32, 0.15);
        }

        .btn-cf-primary {
            background: linear-gradient(180deg, #ff9a3d, #f48120);
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            transition: transform 0.2s, filter 0.2s, opacity 0.2s;
        }

        .btn-cf-primary:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        .btn-cf-primary:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .status-pulse {
            width: 10px;
            height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            position: relative;
            flex: 0 0 auto;
        }
        .status-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.85; }
            100% { transform: scale(3.2); opacity: 0; }
        }

        .tag-type {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #334155;
            border: 1px solid #475569;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 6px;
            color: #cbd5e1;
            min-width: 48px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 42px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569;
            transition: .25s;
            border-radius: 999px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .25s;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,.25);
        }
        input:checked + .slider { background-color: var(--cf-orange); }
        input:checked + .slider:before { transform: translateX(18px); }

        .records-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 680px;
        }

        th {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.55);
            white-space: nowrap;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            vertical-align: middle;
        }

        .copy-btn {
            color: #64748b;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        .copy-btn:hover {
            color: var(--cf-orange);
            transform: scale(1.05);
        }

        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 18px rgba(0,0,0,0.28);
            max-width: calc(100vw - 32px);
            text-align: center;
        }

        .proxy-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .06em;
            white-space: nowrap;
        }
        .proxy-on { color: var(--cf-orange); }
        .proxy-off { color: #64748b; }

        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            transition: color 0.2s, transform 0.2s;
        }
        .search-clear:hover {
            color: var(--cf-orange);
            transform: translateY(-50%) scale(1.08);
        }
    </style>
</head>
<body>

    <div id="toast">Copied to clipboard!</div>

    <header class="bg-slate-900/90 border-b border-slate-800 px-4 sm:px-6 h-16 flex items-center justify-between sticky top-0 z-50 backdrop-blur">
        <div class="flex items-center gap-3 flex-wrap min-w-0">
            <i class="fab fa-cloudflare text-orange-500 text-3xl"></i>
            <h1 class="font-extrabold text-white text-base tracking-tight">DNS Manager</h1>

            <div class="hidden md:flex items-center gap-2 ml-2 text-xs bg-slate-800/60 rounded-lg px-3 py-1.5 border border-slate-700">
                <i class="far fa-clock text-slate-400"></i>
                <span id="serverTime" class="text-slate-200 font-mono">--:--:--</span>
                <span class="text-slate-500">|</span>
                <span id="serverDate" class="text-slate-300">--/--/----</span>
                <span class="text-slate-500">|</span>
                <span id="serverDay" class="text-slate-300 font-medium">---</span>
            </div>

            <div class="md:hidden flex items-center text-[10px] bg-slate-800/50 px-2 py-1 rounded">
                <i class="far fa-clock mr-1 text-orange-400"></i>
                <span id="mobileServerTime" class="font-mono">--:--</span>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <select id="domainSelector" onchange="changeDomain()" class="text-xs font-bold bg-slate-800 text-slate-300 rounded-lg px-3 py-2 border border-slate-700 outline-none focus:border-orange-500">
                <option value="linvpn.shop">linvpn.shop</option>
                <option value="linvpn.site">linvpn.site</option>
            </select>
            <button onclick="fetchRecords()" class="bg-slate-800 p-2 rounded-lg border border-slate-700 hover:bg-slate-700 text-slate-300" title="Refresh">
                <i id="refreshIcon" class="fas fa-sync-alt text-sm"></i>
            </button>
        </div>
    </header>

    <main class="p-4 max-w-5xl mx-auto space-y-6 pb-10">

        <section class="cf-card rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/30">
                <h2 id="formTitle" class="text-xs font-black text-slate-400 uppercase tracking-widest">Add New Record</h2>
                <button onclick="resetForm()" id="cancelBtn" class="hidden text-[11px] text-blue-400 font-bold uppercase hover:underline">Cancel</button>
            </div>

            <div class="p-5 grid grid-cols-1 md:grid-cols-4 gap-5 items-end">
                <input type="hidden" id="editId">

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-2 uppercase tracking-tighter">Type</label>
                    <select id="recordType" class="input-cf">
                        <option value="A">A</option>
                        <option value="AAAA">AAAA</option>
                        <option value="CNAME">CNAME</option>
                        <option value="HTTPS">HTTPS</option>
                        <option value="TXT">TXT</option>
                        <option value="SRV">SRV</option>
                        <option value="MX">MX</option>
                        <option value="NS">NS</option>
                        <option value="PTR">PTR</option>
                        <option value="CAA">CAA</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-2 uppercase tracking-tighter">Name (e.g. @)</label>
                    <input type="text" id="recordName" class="input-cf" placeholder="e.g. @">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-2 uppercase tracking-tighter">Content / IP</label>
                    <input type="text" id="recordContent" class="input-cf" placeholder="e.g. 192.0.2.1">
                </div>

                <div class="flex flex-col gap-3">
                    <div class="flex items-center justify-between px-1">
                        <span class="text-[11px] font-bold text-slate-500 uppercase">Proxy Status</span>
                        <label class="switch">
                            <input type="checkbox" id="recordProxy" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <button onclick="saveRecord()" id="saveBtn" class="btn-cf-primary w-full shadow-lg shadow-orange-500/20">Save Record</button>
                </div>
            </div>
        </section>

        <div class="flex items-center justify-between px-2 gap-3">
            <div class="flex items-center gap-3 min-w-0">
                <div class="status-pulse"></div>
                <div class="flex flex-col min-w-0">
                    <span id="displayDomain" class="text-sm font-bold text-white tracking-tight truncate">linvpn.shop</span>
                    <span class="text-[10px] text-emerald-500 font-black uppercase tracking-widest">Live Status</span>
                </div>
            </div>
            <div id="recordCount" class="text-[10px] font-bold text-slate-500 bg-slate-800 px-3 py-1 rounded-full border border-slate-700 uppercase tracking-tighter whitespace-nowrap">
                0 Records
            </div>
        </div>

        <div class="relative mt-2 px-2">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                <input type="text" id="searchInput" placeholder="Search by Name, IP, or Domain..." class="input-cf pl-9 pr-10 text-sm bg-slate-900/60">
                <div id="clearSearchBtn" class="search-clear hidden" title="Clear search">
                    <i class="fas fa-times-circle text-sm"></i>
                </div>
            </div>
            <p class="text-[10px] text-slate-500 mt-1 ml-1">🔍 Filter records by name or content (IPv4, IPv6, domain)</p>
        </div>

        <section class="cf-card rounded-2xl overflow-hidden">
            <div class="records-scroll">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 90px;">Type</th>
                            <th>Name</th>
                            <th>Content</th>
                            <th style="width: 120px;">Proxying</th>
                            <th style="width: 120px; text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="recordsContainer">
                        <tr>
                            <td colspan="5" class="py-20 text-center text-slate-500">
                                <div class="flex flex-col items-center gap-3">
                                    <i class="fas fa-circle-notch fa-spin text-2xl text-orange-500"></i>
                                    <span class="text-sm font-medium">Fetching records...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const DOMAINS = {
            "linvpn.shop": {
                zoneId: "4ccdd712231c994e57135420400f7645"
            },
            "linvpn.site": {
                zoneId: "8d817d0fa5e946e0e54804c56232accd"
            }
        };

        const WORKER_URL = "https://dns-manager.linvpn2026.workers.dev";
        let currentDomain = "linvpn.shop";
        let allRecords = [];

        function updateServerTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const weekdays = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

            const timeString = `${hours}:${minutes}:${seconds}`;
            const dateString = `${day}/${month}/${year}`;
            const weekdayName = weekdays[now.getDay()];

            const serverTime = document.getElementById('serverTime');
            const serverDate = document.getElementById('serverDate');
            const serverDay = document.getElementById('serverDay');
            const mobileServerTime = document.getElementById('mobileServerTime');

            if (serverTime) serverTime.innerText = timeString;
            if (serverDate) serverDate.innerText = dateString;
            if (serverDay) serverDay.innerText = weekdayName;
            if (mobileServerTime) mobileServerTime.innerText = `${hours}:${minutes}`;
        }

        updateServerTime();
        setInterval(updateServerTime, 1000);

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.innerText = msg;
            toast.style.display = 'block';
            clearTimeout(window.__toastTimer);
            window.__toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        async function copyText(text) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.focus();
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                }
                showToast("Copied to clipboard!");
            } catch (e) {
                alert("Copy failed");
            }
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function changeDomain() {
            currentDomain = document.getElementById('domainSelector').value;
            document.getElementById('displayDomain').innerText = currentDomain;
            document.getElementById('searchInput').value = '';
            toggleClearButton();
            resetForm();
            fetchRecords();
        }

        function toggleClearButton() {
            const inp = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearSearchBtn');
            if (!inp || !clearBtn) return;
            if (inp.value.trim().length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');
        }

        function clearSearch() {
            const input = document.getElementById('searchInput');
            if (!input) return;
            input.value = '';
            toggleClearButton();
            renderRecords(allRecords);
        }

        function applyFilter() {
            const term = document.getElementById('searchInput').value.trim().toLowerCase();
            toggleClearButton();

            if (!allRecords.length) {
                renderRecords([]);
                return;
            }

            if (term === '') {
                renderRecords(allRecords);
                return;
            }

            const filtered = allRecords.filter(r =>
                String(r.name || '').toLowerCase().includes(term) ||
                String(r.content || '').toLowerCase().includes(term) ||
                String(r.type || '').toLowerCase().includes(term)
            );

            renderRecords(filtered);
        }

        function renderRecords(records) {
            const container = document.getElementById('recordsContainer');
            const total = allRecords.length;
            const filteredCount = records.length;
            const searchTerm = document.getElementById('searchInput').value.trim();
            const countEl = document.getElementById('recordCount');

            if (searchTerm === '') countEl.innerText = `${total} Records`;
            else countEl.innerText = `${filteredCount} / ${total} Records`;

            if (!records.length) {
                if (total === 0) {
                    container.innerHTML = `
                        <tr>
                            <td colspan="5" class="py-20 text-center text-slate-500 italic">
                                No DNS records found.
                            </td>
                        </tr>`;
                } else {
                    container.innerHTML = `
                        <tr>
                            <td colspan="5" class="py-20 text-center text-slate-400">
                                <i class="fas fa-filter mr-2"></i>
                                No matching records for "${escapeHtml(searchTerm)}"
                            </td>
                        </tr>`;
                }
                return;
            }

            container.innerHTML = records.map(rec => `
                <tr class="hover:bg-slate-800/40 transition-colors">
                    <td><span class="tag-type">${escapeHtml(rec.type)}</span></td>
                    <td>
                        <div class="flex items-center gap-2 min-w-0">
                            <span class="font-bold text-blue-400 truncate max-w-[160px]">${escapeHtml(rec.name)}</span>
                            <button type="button" onclick='copyText(${JSON.stringify(rec.name || "")})' class="copy-btn text-[11px]" title="Copy name">
                                <i class="far fa-copy"></i>
                            </button>
                        </div>
                    </td>
                    <td>
                        <div class="text-slate-400 font-mono text-[12px] break-all max-w-[260px]">
                            ${escapeHtml(rec.content)}
                        </div>
                    </td>
                    <td>
                        <div class="proxy-badge ${rec.proxied ? 'proxy-on' : 'proxy-off'}">
                            <i class="fas fa-cloud text-xs"></i>
                            <span>${rec.proxied ? 'Proxied' : 'DNS Only'}</span>
                        </div>
                    </td>
                    <td class="text-right space-x-3 whitespace-nowrap">
                        <button type="button" onclick='editRecord(${JSON.stringify(rec.id)})' class="text-slate-400 hover:text-white transition-colors" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button type="button" onclick='deleteRecord(${JSON.stringify(rec.id)})' class="text-slate-500 hover:text-red-500 transition-colors" title="Delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function cfFetch(path, method = 'GET', body = null) {
            const config = DOMAINS[currentDomain];
            const url = `${WORKER_URL}/zones/${config.zoneId}${path}`;

            const options = {
                method,
                mode: 'cors',
                cache: 'no-store',
                headers: {
                    'Content-Type': 'application/json'
                }
            };

            if (body) {
                options.body = JSON.stringify(body);
            }

            const response = await fetch(url, options);
            const text = await response.text();

            let data;
            try {
                data = JSON.parse(text);
            } catch {
                throw new Error(text || 'Invalid response from worker');
            }

            if (data.success === true) return data;

            const errorMsg = data.errors?.[0]?.message || data.message || 'Unknown API error';
            throw new Error(errorMsg);
        }

        async function fetchRecords() {
            const icon = document.getElementById('refreshIcon');
            const container = document.getElementById('recordsContainer');

            if (icon) icon.classList.add('fa-spin');
            if (container) {
                container.innerHTML = `
                    <tr>
                        <td colspan="5" class="py-20 text-center text-slate-500">
                            <div class="flex flex-col items-center gap-3">
                                <i class="fas fa-circle-notch fa-spin text-2xl text-orange-500"></i>
                                <span class="text-sm font-medium">Fetching records...</span>
                            </div>
                        </td>
                    </tr>`;
            }

            try {
                const data = await cfFetch('/dns_records?per_page=100');
                allRecords = data.result || [];
                applyFilter();
            } catch (err) {
                if (container) {
                    container.innerHTML = `
                        <tr>
                            <td colspan="5" class="py-20 text-center text-red-400 font-bold">
                                ${escapeHtml(err.message)}
                            </td>
                        </tr>`;
                }
                const countEl = document.getElementById('recordCount');
                if (countEl) countEl.innerText = 'Error';
            } finally {
                if (icon) icon.classList.remove('fa-spin');
            }
        }

        async function saveRecord() {
            const id = document.getElementById('editId').value.trim();
            const type = document.getElementById('recordType').value.trim();
            const name = document.getElementById('recordName').value.trim();
            const content = document.getElementById('recordContent').value.trim();
            const proxied = document.getElementById('recordProxy').checked;

            if (!name || !content) {
                alert('Please fill both Name and Content.');
                return;
            }

            const payload = {
                type,
                name,
                content,
                proxied,
                ttl: 1
            };

            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerText;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Processing...';

            try {
                if (id) {
                    await cfFetch(`/dns_records/${id}`, 'PUT', payload);
                } else {
                    await cfFetch('/dns_records', 'POST', payload);
                }

                resetForm();
                await fetchRecords();
                showToast('Record successfully saved!');
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        function editRecord(id) {
            const record = allRecords.find(r => r.id === id);
            if (!record) return;

            document.getElementById('editId').value = record.id || '';
            document.getElementById('recordType').value = record.type || 'A';
            document.getElementById('recordName').value = record.name || '';
            document.getElementById('recordContent').value = record.content || '';
            document.getElementById('recordProxy').checked = !!record.proxied;

            document.getElementById('formTitle').innerText = 'Edit Record';
            document.getElementById('saveBtn').innerText = 'Update Record';
            document.getElementById('cancelBtn').classList.remove('hidden');

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('recordType').value = 'A';
            document.getElementById('recordName').value = '';
            document.getElementById('recordContent').value = '';
            document.getElementById('recordProxy').checked = true;

            document.getElementById('formTitle').innerText = 'Add New Record';
            document.getElementById('saveBtn').innerText = 'Save Record';
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        async function deleteRecord(id) {
            if (!confirm('Are you sure you want to delete this record?')) return;

            try {
                await cfFetch(`/dns_records/${id}`, 'DELETE');
                await fetchRecords();
                showToast('Record deleted successfully');
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        }

        window.addEventListener('load', () => {
            document.getElementById('displayDomain').innerText = currentDomain;
            document.getElementById('domainSelector').value = currentDomain;

            fetchRecords();

            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', applyFilter);
                searchInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') clearSearch();
                });
            }

            const clearBtn = document.getElementById('clearSearchBtn');
            if (clearBtn) clearBtn.addEventListener('click', clearSearch);

            updateServerTime();
        });
    </script>
</body>
</html>
