<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Support Chat - Full Featured</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        .my-bubble { background-color: #0084ff; color: white; border-radius: 18px 18px 4px 18px; }
        .other-bubble { background-color: #e4e6eb; color: black; border-radius: 18px 18px 18px 4px; }
        .footer-container { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: white; border-top: 1px solid #e2e8f0; position: sticky; bottom: 0; width: 100%; }
        .message-input { flex: 1; background: #f0f2f5; border: none; border-radius: 9999px; padding: 10px 16px; outline: none; font-size: 15px; min-width: 0; }
        .send-btn { background: #0084ff; color: white; border-radius: 9999px; padding: 8px 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icon-btn { padding: 8px; border-radius: 9999px; cursor: pointer; color: #0084ff; background: transparent; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icon-btn:active { background: #e2e8f0; }
        .user-list-item { cursor: pointer; transition: background 0.2s; }
        .user-list-item:hover { background: #f0f2f5; }
        .user-list-item.active { background: #e4e6eb; }
        .online-dot { width: 8px; height: 8px; background-color: #31a24c; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .offline-dot { width: 8px; height: 8px; background-color: #9ca3af; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .reaction-picker { position: fixed; background: white; border-radius: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); padding: 8px 12px; display: flex; gap: 12px; z-index: 1000; backdrop-filter: blur(10px); }
        .reaction-emoji { font-size: 28px; cursor: pointer; }
        .unread-badge { background-color: #ef4444; color: white; border-radius: 20px; padding: 2px 6px; font-size: 10px; font-weight: bold; margin-left: 8px; display: inline-block; min-width: 20px; text-align: center; }
        .global-unread { position: absolute; top: -4px; right: -4px; background: red; color: white; border-radius: 20px; padding: 2px 6px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="h-screen flex justify-center bg-gray-100">
<div class="w-full max-w-md h-full bg-white flex flex-col shadow-xl relative">
    <!-- Header -->
    <div class="flex justify-between items-center p-3 border-b bg-white sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <div class="relative">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div id="globalUnread" class="hidden global-unread"></div>
            </div>
            <div>
                <div id="chatTitle" class="font-bold">Direct Support</div>
                <div id="userIdDisplay" class="text-xs text-gray-400"></div>
                <div id="presenceInfo" class="text-xs text-gray-500 flex items-center"><span class="online-dot"></span> Online</div>
            </div>
        </div>
        <button id="adminBtn" class="p-2 text-gray-500 hover:bg-gray-100 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
    </div>

    <!-- Messages area -->
    <div id="messagesContainer" class="flex-1 overflow-y-auto p-3 space-y-2"></div>

    <!-- Reply preview -->
    <div id="replyPreview" class="hidden mx-3 mb-1 p-2 bg-gray-100 rounded-xl text-xs flex justify-between items-center">
        <span id="replyText" class="truncate">Replying...</span>
        <button id="cancelReply" class="text-gray-500 font-bold px-2">✕</button>
    </div>

    <!-- Upload progress -->
    <div id="uploading" class="hidden text-xs text-blue-600 p-2 text-center animate-pulse">Uploading media...</div>

    <!-- Footer input -->
    <div class="footer-container">
        <label class="icon-btn cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <input type="file" id="imageInput" accept="image/*" class="hidden">
        </label>
        <label class="icon-btn cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="14" height="14" rx="2"/><polygon points="22 7 16 12 22 17 22 7"/></svg>
            <input type="file" id="videoInput" accept="video/*" class="hidden">
        </label>
        <button id="voiceBtn" class="icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <input type="text" id="textInput" class="message-input" placeholder="Aa">
        <button id="sendBtn" class="send-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>

    <!-- Admin Login Modal -->
    <div id="adminModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl w-64 text-center">
            <h3 class="font-bold text-lg">Admin Access</h3>
            <input type="password" id="adminPass" class="border rounded-full w-full p-2 my-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="loginAdmin" class="bg-blue-600 text-white rounded-full w-full py-2">Login</button>
            <button id="closeAdmin" class="mt-2 text-gray-500 text-sm">Cancel</button>
        </div>
    </div>

    <!-- Admin Sidebar (User List) -->
    <div id="adminSidebar" class="hidden fixed inset-y-0 left-0 w-64 bg-white shadow-xl z-40 transform transition-transform overflow-y-auto">
        <div class="p-4 border-b flex justify-between items-center sticky top-0 bg-white">
            <h2 class="font-bold">Users</h2>
            <button id="closeSidebar" class="text-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="userListContainer" class="divide-y"></div>
        <div class="p-4 border-t">
            <button id="switchToUserMode" class="w-full bg-gray-200 text-gray-700 py-2 rounded-full text-sm">← Switch to User Mode</button>
        </div>
    </div>
    <button id="showUsersBtn" class="hidden fixed bottom-20 left-4 bg-blue-600 text-white p-3 rounded-full shadow-lg z-30">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, serverTimestamp, getDocs, writeBatch, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyATyXbmLp3BAiPP0CLgmuQsnO9v_fp1Ipk",
        authDomain: "vippanel-chat.firebaseapp.com",
        projectId: "vippanel-chat",
        storageBucket: "vippanel-chat.firebasestorage.app",
        messagingSenderId: "1001363252048",
        appId: "1:1001363252048:web:c4eeab2b9382dcb9bfc255"
    };
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dg1omxqvq/upload";
    const UPLOAD_PRESET = "Topup-v2ray";
    const ADMIN_PASS = "JueHtet19991";
    const APP_ID = "vippanel-chat-messenger-v2";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let isAdmin = false;
    let selectedUserId = null;
    let unsubscribeMessages = null;
    let replyTo = null;
    let mediaRecorder, audioChunks;
    let allMessages = [];

    // DOM elements
    const messagesDiv = document.getElementById("messagesContainer");
    const textInput = document.getElementById("textInput");
    const sendBtn = document.getElementById("sendBtn");
    const imageInput = document.getElementById("imageInput");
    const videoInput = document.getElementById("videoInput");
    const voiceBtn = document.getElementById("voiceBtn");
    const adminBtn = document.getElementById("adminBtn");
    const adminModal = document.getElementById("adminModal");
    const adminPass = document.getElementById("adminPass");
    const loginAdmin = document.getElementById("loginAdmin");
    const closeAdmin = document.getElementById("closeAdmin");
    const replyPreview = document.getElementById("replyPreview");
    const replyText = document.getElementById("replyText");
    const cancelReply = document.getElementById("cancelReply");
    const uploadingDiv = document.getElementById("uploading");
    const chatTitle = document.getElementById("chatTitle");
    const userIdDisplay = document.getElementById("userIdDisplay");
    const presenceInfo = document.getElementById("presenceInfo");
    const adminSidebar = document.getElementById("adminSidebar");
    const showUsersBtn = document.getElementById("showUsersBtn");
    const closeSidebar = document.getElementById("closeSidebar");
    const userListContainer = document.getElementById("userListContainer");
    const switchToUserModeBtn = document.getElementById("switchToUserMode");
    const globalUnread = document.getElementById("globalUnread");

    function updateUserIdDisplay() {
        if (currentUser && !isAdmin) {
            userIdDisplay.innerText = `ID: ${currentUser.uid.slice(0,12)}...`;
        } else {
            userIdDisplay.innerText = "";
        }
    }

    async function updatePresence(status) {
        if (!currentUser) return;
        const ref = doc(db, "artifacts", APP_ID, "public", "presence", currentUser.uid);
        await setDoc(ref, { status, lastSeen: serverTimestamp(), role: isAdmin ? "Admin" : "User" }, { merge: true });
    }

    function listenPresenceAndLastSeen() {
        if (!currentUser) return;
        const q = collection(db, "artifacts", APP_ID, "public", "presence");
        onSnapshot(q, (snap) => {
            snap.forEach(docSnap => {
                const data = docSnap.data();
                if (docSnap.id !== currentUser.uid) {
                    if (data.status === "online") {
                        presenceInfo.innerHTML = `<span class="online-dot"></span> Active now`;
                    } else {
                        const last = data.lastSeen?.toDate();
                        if (last) {
                            const diff = Math.floor((new Date() - last) / 1000);
                            if (diff < 60) presenceInfo.innerHTML = `<span class="offline-dot"></span> Last seen just now`;
                            else if (diff < 3600) presenceInfo.innerHTML = `<span class="offline-dot"></span> Last seen ${Math.floor(diff/60)} min ago`;
                            else presenceInfo.innerHTML = `<span class="offline-dot"></span> Last seen ${Math.floor(diff/3600)}h ago`;
                        } else presenceInfo.innerHTML = `<span class="offline-dot"></span> Offline`;
                    }
                }
            });
        });
    }

    // Listen all messages (no index needed)
    function listenAllMessages() {
        if (unsubscribeMessages) unsubscribeMessages();
        const q = collection(db, "artifacts", APP_ID, "public", "data", "messages");
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            allMessages = [];
            snapshot.forEach(doc => allMessages.push({ id: doc.id, ...doc.data() }));
            refreshCurrentView();
            if (isAdmin) updateUserListBadges();
            else updateGlobalUnreadCount();
        }, (err) => {
            console.error("Snapshot error:", err);
            alert("Firestore error: " + err.message);
        });
    }

    function refreshCurrentView() {
        if (isAdmin && selectedUserId) {
            const roomMsgs = allMessages.filter(m => m.roomId === selectedUserId).sort((a,b) => (a.createdAt?.toDate()||0) - (b.createdAt?.toDate()||0));
            renderMessages(roomMsgs);
            // mark as read for this room
            roomMsgs.forEach(msg => {
                if (msg.senderId !== currentUser?.uid && msg.read !== true) {
                    updateDoc(doc(db, "artifacts", APP_ID, "public", "data", "messages", msg.id), { read: true }).catch(console.error);
                }
            });
        } else if (!isAdmin && currentUser) {
            const roomMsgs = allMessages.filter(m => m.roomId === currentUser.uid).sort((a,b) => (a.createdAt?.toDate()||0) - (b.createdAt?.toDate()||0));
            renderMessages(roomMsgs);
            roomMsgs.forEach(msg => {
                if (msg.senderId !== currentUser.uid && msg.read !== true) {
                    updateDoc(doc(db, "artifacts", APP_ID, "public", "data", "messages", msg.id), { read: true }).catch(console.error);
                }
            });
        } else if (isAdmin && !selectedUserId) {
            messagesDiv.innerHTML = '<div class="text-center text-gray-400 mt-10">Click 👥 button and select a user</div>';
        }
    }

    function updateGlobalUnreadCount() {
        if (!currentUser || isAdmin) return;
        const unread = allMessages.filter(m => m.roomId === currentUser.uid && m.senderId !== currentUser.uid && !m.read).length;
        if (unread > 0) {
            globalUnread.innerText = unread > 9 ? "9+" : unread;
            globalUnread.classList.remove("hidden");
        } else {
            globalUnread.classList.add("hidden");
        }
    }

    function updateUserListBadges() {
        if (!isAdmin) return;
        const unreadMap = new Map();
        allMessages.forEach(msg => {
            if (msg.senderId !== currentUser?.uid && !msg.read && msg.roomId) {
                unreadMap.set(msg.roomId, (unreadMap.get(msg.roomId) || 0) + 1);
            }
        });
        document.querySelectorAll(".user-list-item").forEach(item => {
            const uid = item.querySelector(".deleteChatBtn")?.dataset.uid;
            const count = unreadMap.get(uid) || 0;
            let badgeSpan = item.querySelector(".unread-badge");
            if (count > 0) {
                if (badgeSpan) {
                    badgeSpan.innerText = count;
                    badgeSpan.style.display = "inline-block";
                } else {
                    const badge = document.createElement("span");
                    badge.className = "unread-badge";
                    badge.innerText = count;
                    item.querySelector(".flex-1")?.appendChild(badge);
                }
            } else if (badgeSpan) {
                badgeSpan.style.display = "none";
            }
        });
    }

    function renderMessages(messages) {
        messagesDiv.innerHTML = "";
        for (let msg of messages) {
            const isMe = msg.senderId === currentUser?.uid;
            const bubbleClass = isMe ? "my-bubble" : "other-bubble";
            const align = isMe ? "justify-end" : "justify-start";
            let mediaHtml = "";
            if (msg.mediaUrl) {
                if (msg.mediaType === "image") mediaHtml = `<img src="${msg.mediaUrl}" class="max-w-full max-h-64 rounded-lg mb-1 cursor-pointer" onclick="window.open('${msg.mediaUrl}')">`;
                else if (msg.mediaType === "video") mediaHtml = `<video src="${msg.mediaUrl}" controls class="max-w-full max-h-80 rounded-lg mb-1" preload="metadata"></video>`;
                else if (msg.mediaType === "audio") mediaHtml = `<audio src="${msg.mediaUrl}" controls class="w-48 mb-1"></audio>`;
            }
            let replyHtml = "";
            if (msg.replyTo && msg.replyTo.preview) {
                replyHtml = `<div class="text-xs opacity-70 mb-1">↩️ ${escapeHtml(msg.replyTo.preview)}</div>`;
            }
            let reactionsHtml = "";
            if (msg.reactions && Object.keys(msg.reactions).length) {
                const grouped = {};
                Object.values(msg.reactions).forEach(e => grouped[e] = (grouped[e]||0)+1);
                reactionsHtml = `<div class="flex gap-1 mt-1">${Object.entries(grouped).map(([e,c]) => `<span class="text-xs bg-gray-200 px-2 py-0.5 rounded-full">${e} ${c}</span>`).join("")}</div>`;
            }
            const time = msg.createdAt?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || "";
            const div = document.createElement("div");
            div.className = `flex ${align} mb-2`;
            div.innerHTML = `
                <div class="max-w-[75%] p-3 rounded-2xl ${bubbleClass}">
                    ${replyHtml}
                    ${mediaHtml}
                    ${msg.text ? `<p class="text-sm break-words">${escapeHtml(msg.text)}</p>` : ""}
                    ${reactionsHtml}
                    <div class="text-[10px] text-right mt-1 opacity-70">${time}</div>
                </div>
            `;
            const bubbleDiv = div.querySelector(`.${bubbleClass}`);
            if (bubbleDiv) {
                bubbleDiv.addEventListener("contextmenu", (e) => { e.preventDefault(); showMessageActions(msg); });
                let timer; bubbleDiv.addEventListener("touchstart", () => { timer = setTimeout(() => showMessageActions(msg), 500); });
                bubbleDiv.addEventListener("touchend", () => clearTimeout(timer));
            }
            messagesDiv.appendChild(div);
        }
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function showMessageActions(msg) {
        const existing = document.querySelector(".reaction-picker");
        if (existing) existing.remove();
        const picker = document.createElement("div");
        picker.className = "reaction-picker";
        ["👍","❤️","😂","😮","😢","😡"].forEach(emoji => {
            const span = document.createElement("span");
            span.className = "reaction-emoji";
            span.innerText = emoji;
            span.onclick = async () => { await addReaction(msg.id, emoji); picker.remove(); };
            picker.appendChild(span);
        });
        const replyBtn = document.createElement("button");
        replyBtn.innerText = "💬 Reply";
        replyBtn.className = "ml-2 text-sm bg-blue-500 text-white px-3 py-1 rounded-full";
        replyBtn.onclick = () => {
            replyTo = { id: msg.id, preview: msg.text?.slice(0,50) || (msg.mediaType || "Media") };
            replyText.innerText = replyTo.preview;
            replyPreview.classList.remove("hidden");
            picker.remove();
        };
        picker.appendChild(replyBtn);
        document.body.appendChild(picker);
        picker.style.left = "50%";
        picker.style.transform = "translateX(-50%)";
        picker.style.bottom = "80px";
        setTimeout(() => {
            document.body.addEventListener("click", function rm(e) { if (!picker.contains(e.target)) picker.remove(); document.body.removeEventListener("click", rm); });
        }, 100);
    }

    async function addReaction(messageId, emoji) {
        const msgRef = doc(db, "artifacts", APP_ID, "public", "data", "messages", messageId);
        const snap = await getDoc(msgRef);
        if (snap.exists()) {
            const reactions = snap.data().reactions || {};
            let newReactions = { ...reactions };
            if (newReactions[currentUser.uid] === emoji) delete newReactions[currentUser.uid];
            else newReactions[currentUser.uid] = emoji;
            await updateDoc(msgRef, { reactions: newReactions });
        }
    }

    async function sendMessage(content, mediaUrl = null, mediaType = null) {
        if (!currentUser) return;
        let roomId = isAdmin ? selectedUserId : currentUser.uid;
        if (isAdmin && !roomId) { alert("Please select a user from 👥 list"); return; }
        const payload = {
            text: content || null, mediaUrl, mediaType,
            senderId: currentUser.uid,
            senderRole: isAdmin ? "Admin" : "User",
            roomId: roomId,
            createdAt: serverTimestamp(),
            read: false
        };
        if (replyTo) {
            payload.replyTo = { messageId: replyTo.id, preview: replyTo.preview };
            replyTo = null; replyPreview.classList.add("hidden");
        }
        try {
            await addDoc(collection(db, "artifacts", APP_ID, "public", "data", "messages"), payload);
            if (isAdmin) loadUserList();
        } catch (err) { alert("Send failed: " + err.message); }
    }

    sendBtn.onclick = async () => { const txt = textInput.value.trim(); if (txt) await sendMessage(txt); textInput.value = ""; };
    textInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendBtn.click(); });

    async function uploadFile(file, type) {
        if (!file) return;
        uploadingDiv.classList.remove("hidden");
        const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);
        try {
            const res = await fetch(CLOUDINARY_URL, { method: "POST", body: fd });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            await sendMessage(null, data.secure_url, type);
        } catch (err) { alert("Upload failed: " + err.message); }
        uploadingDiv.classList.add("hidden");
        imageInput.value = ""; videoInput.value = "";
    }
    imageInput.onchange = (e) => uploadFile(e.target.files[0], "image");
    videoInput.onchange = (e) => uploadFile(e.target.files[0], "video");

    voiceBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: "audio/webm" });
                const file = new File([blob], "voice.webm", { type: "audio/webm" });
                await uploadFile(file, "audio");
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            voiceBtn.style.color = "red";
            setTimeout(() => { if (mediaRecorder?.state === "recording") { mediaRecorder.stop(); voiceBtn.style.color = "#0084ff"; } }, 10000);
        } catch(e) { alert("Microphone permission required"); }
    };

    async function loadUserList() {
        const usersSet = new Set();
        allMessages.forEach(msg => { if (msg.roomId) usersSet.add(msg.roomId); });
        userListContainer.innerHTML = "";
        for (let uid of usersSet) {
            const div = document.createElement("div");
            div.className = `user-list-item p-3 border-b flex justify-between items-center ${selectedUserId === uid ? 'active' : ''}`;
            div.innerHTML = `
                <div class="flex-1">
                    <div class="font-medium text-sm">${uid.slice(0,10)}...</div>
                    <div class="text-xs text-gray-400">Click to chat</div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="unread-badge" style="display:none"></span>
                    <button class="deleteChatBtn text-red-500 p-1" data-uid="${uid}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    </button>
                </div>
            `;
            div.addEventListener("click", (e) => { if (!e.target.closest(".deleteChatBtn")) selectUser(uid); });
            const delBtn = div.querySelector(".deleteChatBtn");
            delBtn.addEventListener("click", async (e) => { e.stopPropagation(); if (confirm(`Delete all messages with ${uid.slice(0,10)}...?`)) await deleteUserConversation(uid); });
            userListContainer.appendChild(div);
        }
        updateUserListBadges();
    }

    async function deleteUserConversation(uid) {
        const toDelete = allMessages.filter(m => m.roomId === uid).map(m => m.id);
        const batch = writeBatch(db);
        toDelete.forEach(id => {
            const ref = doc(db, "artifacts", APP_ID, "public", "data", "messages", id);
            batch.delete(ref);
        });
        await batch.commit();
        if (selectedUserId === uid) {
            selectedUserId = null;
            refreshCurrentView();
            chatTitle.innerText = "Admin Panel";
        }
        await loadUserList();
    }

    function selectUser(uid) {
        selectedUserId = uid;
        chatTitle.innerText = `Chat with ${uid.slice(0,8)}...`;
        presenceInfo.innerHTML = `<span class="online-dot"></span> User selected`;
        adminSidebar.classList.add("hidden");
        // highlight active
        document.querySelectorAll(".user-list-item").forEach(el => el.classList.remove("active"));
        const activeItem = Array.from(userListContainer.children).find(c => c.querySelector(".deleteChatBtn")?.dataset.uid === uid);
        if (activeItem) activeItem.classList.add("active");
        refreshCurrentView();
        // mark unread as read
        const roomMsgs = allMessages.filter(m => m.roomId === uid);
        roomMsgs.forEach(msg => {
            if (msg.senderId !== currentUser?.uid && msg.read !== true) {
                updateDoc(doc(db, "artifacts", APP_ID, "public", "data", "messages", msg.id), { read: true }).catch(console.error);
            }
        });
        updateUserListBadges();
    }

    function switchToUser() {
        isAdmin = false;
        localStorage.removeItem("isAdmin");
        selectedUserId = null;
        chatTitle.innerText = "Direct Support";
        showUsersBtn.classList.add("hidden");
        adminSidebar.classList.add("hidden");
        if (currentUser) {
            updatePresence("online");
            listenPresenceAndLastSeen();
            updateUserIdDisplay();
            presenceInfo.innerHTML = `<span class="online-dot"></span> Online`;
            refreshCurrentView();
        }
    }

    adminBtn.onclick = () => adminModal.classList.remove("hidden");
    closeAdmin.onclick = () => adminModal.classList.add("hidden");
    loginAdmin.onclick = async () => {
        if (adminPass.value === ADMIN_PASS) {
            isAdmin = true;
            localStorage.setItem("isAdmin", "true");
            adminModal.classList.add("hidden");
            showUsersBtn.classList.remove("hidden");
            chatTitle.innerText = "Admin Panel";
            presenceInfo.innerHTML = `<span class="online-dot"></span> Admin Mode`;
            userIdDisplay.innerText = "";
            selectedUserId = null;
            await loadUserList();
            refreshCurrentView();
            updatePresence("online");
        } else alert("Wrong password");
        adminPass.value = "";
    };
    showUsersBtn.onclick = () => adminSidebar.classList.remove("hidden");
    closeSidebar.onclick = () => adminSidebar.classList.add("hidden");
    switchToUserModeBtn.onclick = () => { adminSidebar.classList.add("hidden"); switchToUser(); };
    cancelReply.onclick = () => { replyTo = null; replyPreview.classList.add("hidden"); };
    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[m])) || ""; }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            localStorage.setItem("chat_user_uid", user.uid);
            updateUserIdDisplay();
            const savedAdmin = localStorage.getItem("isAdmin") === "true";
            if (savedAdmin) {
                isAdmin = true;
                showUsersBtn.classList.remove("hidden");
                chatTitle.innerText = "Admin Panel";
                presenceInfo.innerHTML = `<span class="online-dot"></span> Admin Mode`;
                userIdDisplay.innerText = "";
                listenAllMessages();
                setTimeout(() => loadUserList(), 500);
                refreshCurrentView();
            } else {
                isAdmin = false;
                listenAllMessages();
                updatePresence("online");
                listenPresenceAndLastSeen();
            }
        } else {
            await signInAnonymously(auth);
        }
    });

    window.addEventListener("beforeunload", () => updatePresence("offline"));
    window.addEventListener("focus", () => updatePresence("online"));
</script>
</body>
</html>
