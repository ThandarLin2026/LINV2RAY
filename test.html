<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JK-V2RAY | User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .input-box { background: #0f172a; border: 1px solid #1e293b; color: white; padding: 14px; border-radius: 20px; width: 100%; outline: none; }
        .bank-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid rgba(255,255,255,0.1); }
        .online-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:0.5;}50%{opacity:1;} }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: rgba(15,23,42,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; padding: 1.5rem; max-width: 90%; width: 320px; text-align: center; }
        .hidden-modal { display: none; }
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .flag-icon { width: 24px; height: 18px; object-fit: cover; border-radius: 2px; }
    </style>
</head>
<body class="pb-32">

    <div class="flex gap-2 items-center">
        <div id="display-uid" class="px-4 py-2 bg-slate-900 rounded-2xl text-[10px] font-mono text-blue-400">ID: LOADING...</div>
        <button id="manual-refresh-balance" class="bg-blue-500/20 hover:bg-blue-500/40 p-2 rounded-2xl transition-all" title="Refresh Balance">
            <i class="fas fa-sync-alt text-blue-400 text-xs"></i>
        </button>
    </div>
</div>

<div id="main-page" class="max-w-md mx-auto px-4 space-y-6">
    <div id="admin-message-banner" class="hidden"></div>
    <div class="glass p-10 rounded-[2.5rem] text-center relative">
        <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">My Balance</p>
        <h1 id="user-balance" class="text-5xl font-black">0 THB</h1>
        <div id="balance-live-status" class="absolute top-3 right-3 text-[8px] text-green-400 flex items-center gap-1"><i class="fas fa-circle text-[6px]"></i> Live</div>
    </div>

    <div class="glass p-2 rounded-[2.5rem]"><div class="flex justify-around gap-2">
        <button data-tab="v2box" class="tab-btn flex-1 py-3 rounded-xl font-black text-xs uppercase bg-white/5 text-slate-400">V2RAY</button>
        <button data-tab="zivpn" class="tab-btn flex-1 py-3 rounded-xl font-black text-xs uppercase bg-white/5 text-slate-400">ZIVPN</button>
        <button data-tab="netmod" class="tab-btn flex-1 py-3 rounded-xl font-black text-xs uppercase bg-white/5 text-slate-400">NetMod</button>
    </div></div>

    <div id="v2box-tab" class="tab-pane glass p-6 rounded-[2.5rem] space-y-5">
        <div class="flex justify-between"><div class="flex items-center gap-3"><img id="v2box-flag-img" class="w-6 h-5 rounded flag-icon" src="https://flagicons.lipis.dev/flags/4x3/th.svg"><h2 class="text-xs font-black">V2RAY</h2></div><span id="v2box-stock" class="bg-blue-500/10 text-blue-400 px-4 py-1.5 rounded-full text-[10px] font-black">STOCK: 0</span></div>
        <select id="v2box-country" onchange="updateProductStock('v2box')" class="input-box text-sm">

            <option value="sg">Singapore</option>
        </select>
        <div id="v2box-gen-area"></div>
    </div>
    <div id="zivpn-tab" class="tab-pane glass p-6 rounded-[2.5rem] space-y-5 hidden">
        <div class="flex justify-between"><div class="flex items-center gap-3"><img id="zivpn-flag-img" class="w-6 h-5 rounded flag-icon" src="https://flagicons.lipis.dev/flags/4x3/th.svg"><h2 class="text-xs font-black">ZIVPN UDP</h2></div><span id="zivpn-stock" class="bg-purple-500/10 text-purple-400 px-4 py-1.5 rounded-full text-[10px] font-black">STOCK: 0</span></div>
        <select id="zivpn-country" onchange="updateProductStock('zivpn')" class="input-box text-sm">
            <option value="th">Thailand</option>
            <option value="sg">Singapore</option>
        </select>
        <div id="zivpn-gen-area"></div>
    </div>
    <div id="netmod-tab" class="tab-pane glass p-6 rounded-[2.5rem] space-y-5 hidden">
        <div class="flex justify-between"><div class="flex items-center gap-3"><img id="netmod-flag-img" class="w-6 h-5 rounded flag-icon" src="https://flagicons.lipis.dev/flags/4x3/th.svg"><h2 class="text-xs font-black">NetMod VPN</h2></div><span id="netmod-stock" class="bg-green-500/10 text-green-400 px-4 py-1.5 rounded-full text-[10px] font-black">STOCK: 0</span></div>
        <select id="netmod-country" onchange="updateProductStock('netmod')" class="input-box text-sm">
            <option value="th">Thailand</option>

    <div class="space-y-4">
        <div class="bank-card p-6 rounded-[2.5rem]">
            <div class="flex justify-between items-center"><div class="logo-frame w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center"><img id="u-bank-logo-icon" class="w-8 h-8 object-contain"></div><div class="text-center"><p id="u-bank-name" class="text-lg font-black text-yellow-400">BANK</p></div><div onclick="document.getElementById('qr-modal').classList.remove('hidden')" class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center cursor-pointer"><img id="u-bank-qr-icon" class="w-8 h-8 object-contain"></div></div>
            <div class="text-center mt-3"><p class="text-[10px] text-slate-500">Account Holder</p><p id="u-bank-holder" class="font-black">HOLDER NAME</p></div>
            <div onclick="copyNumber()" class="bg-black/30 p-4 rounded-2xl mt-3 cursor-pointer relative"><p class="text-[10px] text-slate-500">Account Number</p><p id="u-bank-no" class="text-2xl font-mono font-black">000 000 0000</p><div id="copy-msg" class="absolute inset-0 bg-blue-600 rounded-2xl flex items-center justify-center text-xs font-bold opacity-0 transition">COPIED!</div></div>
        </div>
        <div class="glass p-6 rounded-[2.5rem] space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <select id="dep-amt" class="input-box text-xs"><option value="50">50 THB</option><option value="100">100 THB</option><option value="200">200 THB</option><option value="300">300 THB</option></select>
                <label for="slip-file" class="bg-blue-500/10 flex items-center justify-center rounded-2xl cursor-pointer text-blue-400 text-[10px] font-black uppercase"><i class="fas fa-camera mr-2"></i> Upload Slip</label>
                <input type="file" id="slip-file" class="hidden" accept="image/*">
            </div>
            <div id="slip-preview-box" class="hidden text-center"><img id="slip-preview" class="w-32 h-32 mx-auto object-cover rounded-2xl"></div>
            <button id="submit-topup-btn" class="w-full bg-blue-600 py-4 rounded-[1.5rem] font-black uppercase text-xs hover:bg-blue-700 transition-all">Submit Topup Request</button>

<!-- Modals -->
<div id="qr-modal" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-8 hidden"><div class="text-center"><img id="u-bank-qr-img" class="w-72 h-72 bg-white p-2 rounded-2xl"><button onclick="document.getElementById('qr-modal').classList.add('hidden')" class="mt-4 bg-white/10 px-6 py-3 rounded-2xl text-xs">Close</button></div></div>
<div id="result-modal" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6 hidden"><div class="glass w-full max-w-sm rounded-[3rem] p-6 space-y-4"><h2 class="text-xl font-black text-yellow-400">CONFIG</h2><textarea id="result-area" readonly class="input-box h-40 text-[10px] font-mono"></textarea><p id="expiry-date-text" class="text-xs text-slate-300"></p><div class="flex gap-2"><button onclick="copyResult()" class="flex-1 bg-blue-600 py-3 rounded-2xl text-xs font-black">Copy</button><button onclick="closeResultModal()" class="flex-1 bg-white/5 py-3 rounded-2xl text-xs">Close</button></div></div></div>
<div id="insufficient-modal" class="fixed inset-0 bg-black/95 z-[110] flex items-center justify-center p-6 hidden"><div class="glass p-8 rounded-3xl text-center"><i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i><h2 class="text-xl font-black text-red-400">Insufficient Balance</h2><button onclick="closeInsufficientModal()" class="mt-4 bg-red-600 px-6 py-3 rounded-2xl text-xs font-black">OK</button></div></div>
<div id="custom-alert-modal" class="modal-overlay hidden-modal"><div class="modal-card"><div id="alert-icon"><i class="fas fa-info-circle text-4xl text-blue-400"></i></div><h3 id="alert-title" class="text-xl font-bold mt-3">Alert</h3><p id="alert-message" class="text-slate-300 my-4 text-sm"></p><button id="alert-close-btn" class="bg-blue-600 px-6 py-2 rounded-full text-sm font-bold w-full">OK</button></div></div>
<div id="custom-confirm-modal" class="modal-overlay hidden-modal"><div class="modal-card"><i class="fas fa-question-circle text-5xl text-yellow-400"></i><h3 id="confirm-title" class="text-xl font-bold mt-3">Confirm</h3><p id="confirm-message" class="text-slate-300 my-4 text-sm"></p><div class="flex gap-3"><button id="confirm-yes" class="flex-1 bg-green-600 py-2 rounded-full text-sm font-bold">Yes</button><button id="confirm-no" class="flex-1 bg-red-600/70 py-2 rounded-full text-sm font-bold">No</button></div></div></div>

<div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-80 glass rounded-[2.5rem] p-2 flex justify-center shadow-2xl gap-3">
    <button id="hard-refresh-btn" class="p-4 text-slate-500 hover:text-white transition-all"><i class="fas fa-redo-alt text-xl"></i></button>
</div>

<a href="https://linvpn.shop/message.html" target="_blank" class="fixed bottom-5 right-5 z-[110] bg-gradient-to-br from-green-500 to-green-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl shadow-green-500/40"><i class="fas fa-comment-dots text-2xl"></i></a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc, updateDoc, addDoc, collection, increment, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyARcw7hRhSuIJYFfLT9Pg3yat1LS36UOeQ",
        authDomain: "vipv2ray-85970.firebaseapp.com",
        projectId: "vipv2ray-85970",
        storageBucket: "vipv2ray-85970.firebasestorage.app",
        messagingSenderId: "526032668769",
        appId: "1:526032668769:web:1041445a61ed70e4b40220",
        measurementId: "G-492NQP7QH6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ====================== CLOUDINARY CONFIGURATION ======================
    const CLOUDINARY_CLOUD_NAME = "dnacyckke";
    const CLOUDINARY_UPLOAD_PRESET = "vipv2ray-panel";
    // ======================================================================

    const TG_TOKEN = "8719916377:AAElljRpk4nk9aAJAFGtJ-tjyacw5GdjS80";
    const TG_CHAT_ID = "7848197948";

    let allServers = [];
    let currentUser = null;
    window.currentBalance = 0;
    let productPrices = { v2box: 50, zivpn: 50, netmod: 50 };
    let productLogos = { v2box_logo: '', zivpn_logo: '', netmod_logo: '' };
    let currentPing = 0;
    let originalSlipFile = null;
    let unsubscribeBalance = null;

    async function getDeviceID() {
        let id = localStorage.getItem('v2_stable_uid');
        if (!id) {
            const platform = navigator.platform;
            const random = Math.floor(Math.random() * 10000);
            id = `V2-${platform.substring(0,3).toUpperCase()}-${random}-${Date.now().toString().slice(-4)}`;
            localStorage.setItem('v2_stable_uid', id);
        }
        return id;
    }

    async function measurePing() {
        const start = Date.now();
        try {
            await fetch("https://www.google.com/generate_204", { mode: 'no-cors', cache: 'no-cache' });
            currentPing = Date.now() - start;
            return currentPing;
        } catch (e) { return 999; }
    }

    async function sendTelegramNotify(uid, amount, slipUrl) {
        const message = `🔔 *New Topup Request*\n\n👤 User ID: \`${uid}\`\n💰 Amount: *${amount} THB*\n📅 Time: ${new Date().toLocaleString()}\n\n⚡ Please check admin panel.`;
        try {
            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: 'Markdown' })
            });
            if (slipUrl && slipUrl.startsWith('http')) {
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, photo: slipUrl, caption: `Receipt from ID: ${uid}` })
                });
            }
        } catch (error) { console.error("Telegram error:", error); }
    }

    function showAlertModal(title, message, iconHtml) {
        return new Promise((resolve) => {
            document.getElementById('alert-icon').innerHTML = iconHtml || '<i class="fas fa-info-circle text-4xl text-blue-400"></i>';
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-message').innerText = message;
            const modal = document.getElementById('custom-alert-modal');
            modal.classList.remove('hidden-modal');
            const closeBtn = document.getElementById('alert-close-btn');
            const handler = () => { modal.classList.add('hidden-modal'); closeBtn.removeEventListener('click', handler); resolve(); };
            closeBtn.addEventListener('click', handler);
        });
    }
    window.showSuccessModal = (msg) => showAlertModal("✅ SUCCESS", msg, '<i class="fas fa-check-circle text-4xl text-green-400"></i>');
    window.showErrorModal = (msg) => showAlertModal("❌ ERROR", msg, '<i class="fas fa-exclamation-circle text-4xl text-red-400"></i>');
    window.showConfirmModal = (title, message) => {
        return new Promise((resolve) => {
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-message').innerText = message;
            const modal = document.getElementById('custom-confirm-modal');
            modal.classList.remove('hidden-modal');
            const yes = () => { modal.classList.add('hidden-modal'); resolve(true); };
            const no = () => { modal.classList.add('hidden-modal'); resolve(false); };
            document.getElementById('confirm-yes').onclick = yes;
            document.getElementById('confirm-no').onclick = no;
        });
    };
    window.showInsufficientModal = () => document.getElementById('insufficient-modal').classList.remove('hidden');
    window.closeInsufficientModal = () => document.getElementById('insufficient-modal').classList.add('hidden');

    function loadUserData(uid) {
        if (unsubscribeBalance) unsubscribeBalance();
        const userDocRef = doc(db, "users", uid);
        unsubscribeBalance = onSnapshot(userDocRef, 
            (docSnap) => {
                if(docSnap.exists()) {
                    window.currentBalance = docSnap.data().balance || 0;
                    document.getElementById('user-balance').innerHTML = window.currentBalance + " THB";
                    const statusDiv = document.getElementById('balance-live-status');
                    if(statusDiv) statusDiv.innerHTML = '<i class="fas fa-circle text-[6px] text-green-400"></i> Live';
                } else {
                    setDoc(userDocRef, { balance: 0, createdAt: serverTimestamp() });
                }
            },
            (error) => {
                console.error("Balance listener error:", error);
                const statusDiv = document.getElementById('balance-live-status');
                if(statusDiv) statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle text-[6px] text-red-400"></i> Reconnecting...';
                setTimeout(() => loadUserData(uid), 5000);
            }
        );
    }

    async function manualRefreshBalance() {
        if (!currentUser) return;
        const userDocRef = doc(db, "users", currentUser.uid);
        try {
            const docSnap = await getDoc(userDocRef);
            if(docSnap.exists()) {
                window.currentBalance = docSnap.data().balance || 0;
                document.getElementById('user-balance').innerHTML = window.currentBalance + " THB";
                await window.showSuccessModal("Balance refreshed!");
            } else {
                await setDoc(userDocRef, { balance: 0, createdAt: serverTimestamp() });
                window.currentBalance = 0;
                document.getElementById('user-balance').innerHTML = "0 THB";
            }
        } catch(e) {
            console.error("Manual refresh error:", e);
            await window.showErrorModal("Could not refresh balance. Check network.");
        }
    }

    function getExpiryDateString() {
        const expiry = new Date();
        expiry.setDate(expiry.getDate() + 30);
        return `${expiry.getDate().toString().padStart(2,'0')}/${(expiry.getMonth()+1).toString().padStart(2,'0')}/${expiry.getFullYear()}`;
    }

    window.buyOneConfig = async (productType, country) => {
        const price = productPrices[productType] || 50;
        if (window.currentBalance < price) { window.showInsufficientModal(); return; }
        const targetServer = allServers.find(s => s.product === productType && s.flag === country && s.available !== false);
        if (!targetServer) { await window.showErrorModal("Out of stock!"); return; }
        if (!await window.showConfirmModal("Confirm Purchase", `${price} THB will be deducted. Continue?`)) return;
        try {
            await updateDoc(doc(db, "users", currentUser.uid), { balance: increment(-price) });
            await updateDoc(doc(db, "servers", targetServer.id), { available: false });
            document.getElementById('result-area').value = targetServer.config;
            document.getElementById('expiry-date-text').innerHTML = `📅 Expiry Date: <span class="font-bold text-yellow-400">${getExpiryDateString()}</span> (30 days)`;
            document.getElementById('result-modal').classList.remove('hidden');
        } catch(e) { 
            console.error(e);
            await window.showErrorModal("Purchase failed: " + e.message);
        }
    };

    window.copyResult = async () => {
        document.getElementById('result-area').select();
        document.execCommand('copy');
        await window.showSuccessModal("Config copied!");
    };
    window.closeResultModal = () => {
        document.getElementById('result-modal').classList.add('hidden');
        document.getElementById('expiry-date-text').innerHTML = '';
    };

    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
        const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`;
        const response = await fetch(url, { method: "POST", body: formData });
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Cloudinary upload failed: ${response.status} ${errorText}`);
        }
        const data = await response.json();
        if (!data.secure_url) throw new Error("Cloudinary did not return secure_url");
        return data.secure_url;
    }

    window.handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            window.showErrorModal("Please select an image file.");
            e.target.value = '';
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            window.showErrorModal("File too large. Max 10MB.");
            e.target.value = '';
            return;
        }
        originalSlipFile = file;
        const previewUrl = URL.createObjectURL(file);
        document.getElementById('slip-preview').src = previewUrl;
        document.getElementById('slip-preview-box').classList.remove('hidden');
    };

    window.submitTopup = async () => {
        const btn = document.getElementById('submit-topup-btn');
        const originalText = btn.innerText;
        if(btn.disabled) { await window.showErrorModal("Please wait, processing previous request..."); return; }
        if(!currentUser) { await window.showErrorModal("User not authenticated."); return; }
        if(!originalSlipFile) { await window.showErrorModal("Upload payment slip first!"); return; }
        const amt = document.getElementById('dep-amt').value;
        if(!amt || amt < 10) { await window.showErrorModal("Select valid amount."); return; }
        
        try {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner mr-2"></span> UPLOADING TO CLOUDINARY...';
            let imageUrl = await uploadToCloudinary(originalSlipFile);
            console.log("Uploaded to Cloudinary:", imageUrl);
            btn.innerHTML = '<span class="loading-spinner mr-2"></span> SAVING REQUEST...';
            await addDoc(collection(db, "topup_requests"), { 
                uid: currentUser.deviceId,
                authUid: currentUser.uid,
                amount: parseInt(amt), 
                slip: imageUrl,
                createdAt: serverTimestamp(),
                status: "pending"
            });
            sendTelegramNotify(currentUser.deviceId, amt, imageUrl).catch(e => console.warn("Telegram send failed:", e));
            await window.showSuccessModal(`Topup request for ${amt} THB submitted! Admin will approve soon.`);
            originalSlipFile = null;
            document.getElementById('slip-preview-box').classList.add('hidden');
            document.getElementById('slip-file').value = '';
        } catch(e) {
            console.error("Topup error:", e);
            let errorMsg = e.message || "Unknown error. Please try again.";
            if (errorMsg.includes("upload preset") || errorMsg.includes("400")) {
                errorMsg = "Cloudinary upload preset invalid. Please contact admin.";
            } else if (errorMsg.includes("Failed to fetch")) {
                errorMsg = "Network error. Check your internet connection.";
            }
            await window.showErrorModal("Topup failed: " + errorMsg);
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    };

    window.updateProductStock = (productType) => updateProductUI(productType, '');

    function updateAllProductUI() {
        updateProductUI('v2box', 'V2RAY');
        updateProductUI('zivpn', 'ZIVPN UDP');
        updateProductUI('netmod', 'NetMod VPN');
    }

    function updateProductUI(productType, displayName) {
        const country = document.getElementById(`${productType}-country`)?.value || 'th';
        const filtered = allServers.filter(s => s.product === productType && s.flag === country && s.available !== false);
        const stockCount = filtered.length;
        const stockBadge = document.getElementById(`${productType}-stock`);
        if(stockBadge) stockBadge.innerText = `STOCK: ${stockCount}`;
        
        // SVG flag URLs
        const flagMap = {
            'th': 'https://flagicons.lipis.dev/flags/4x3/th.svg',
            'sg': 'https://flagicons.lipis.dev/flags/4x3/sg.svg'
        };
        const flagImg = document.getElementById(`${productType}-flag-img`);
        if(flagImg) flagImg.src = flagMap[country];
        
        const displayArea = document.getElementById(`${productType}-gen-area`);
        if(!displayArea) return;
        
        if(stockCount > 0) {
            const firstServer = filtered[0];
            const price = productPrices[productType] || 50;
            let productLogoUrl = '';
            if(productType === 'v2box') productLogoUrl = productLogos.v2box_logo;
            else if(productType === 'zivpn') productLogoUrl = productLogos.zivpn_logo;
            else if(productType === 'netmod') productLogoUrl = productLogos.netmod_logo;
            const productLogoHtml = productLogoUrl ? `<img src="${productLogoUrl}" class="w-8 h-8 object-contain inline-block mr-2 rounded">` : '';
            const serverLogoHtml = firstServer.logoUrl ? 
                `<img src="${firstServer.logoUrl}" class="w-6 h-6 rounded-full object-cover bg-white/10 p-0.5" onerror="this.src='https://placehold.co/25x25?text=?'">` : 
                `<div class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center text-[10px]">🖥️</div>`;
            displayArea.innerHTML = `
                <div class="bg-white/5 p-6 rounded-3xl border border-white/5 text-center space-y-5">
                    <div class="flex justify-center items-center gap-2 mb-2">
                        ${serverLogoHtml}
                        <span class="text-xs font-black text-blue-400 bg-blue-500/20 px-3 py-1 rounded-full">${firstServer.name || displayName}</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="bg-black/40 p-3 rounded-2xl border border-white/5"><div class="w-2 h-2 bg-green-500 rounded-full online-dot mx-auto mb-1"></div><p class="text-[8px] font-bold text-slate-500 uppercase">Status</p><p class="text-[9px] font-black text-green-400">ONLINE</p></div>
                        <div class="bg-black/40 p-3 rounded-2xl border border-white/5 text-center"><i class="fas fa-signal text-[10px] text-blue-400 mb-1"></i><p class="text-[8px] font-bold text-slate-500 uppercase">Live Ping</p><p id="${productType}-live-ping" class="text-[9px] font-black text-blue-400">${currentPing || '...'}ms</p></div>
                        <div class="bg-black/40 p-3 rounded-2xl border border-white/5 text-center"><i class="fas fa-plug text-[10px] text-purple-400 mb-1"></i><p class="text-[8px] font-bold text-slate-500 uppercase">Port</p><p class="text-[9px] font-black text-purple-400">${firstServer.port || '80'}</p></div>
                    </div>
                    <button onclick="buyOneConfig('${productType}', '${country}')" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase shadow-xl shadow-blue-600/30 flex items-center justify-center gap-2">${productLogoHtml} GENERATE ${displayName} (${price} THB)</button>
                    <div class="bg-white/5 p-3 rounded-2xl border border-white/5 mt-2"><p class="text-[9px] font-black text-yellow-400 uppercase tracking-widest mb-1">Server Note</p><p class="text-[11px] text-yellow-300/80 font-medium">${firstServer.note || 'No notes available.'}</p></div>
                </div>`;
        } else {
            displayArea.innerHTML = `<div class="bg-red-500/5 p-10 rounded-3xl border border-red-500/10 text-center"><p class="text-xs font-bold text-red-400 uppercase tracking-widest">Out of Stock</p></div>`;
        }
    }

    function loadAdminMessage() {
        onSnapshot(doc(db, "settings", "adminMessage"), (docSnap) => {
            const msgContainer = document.getElementById('admin-message-banner');
            if (docSnap.exists() && docSnap.data().text && docSnap.data().text.trim() !== "") {
                const msgText = docSnap.data().text;
                msgContainer.innerHTML = `
                    <div class="bg-gradient-to-r from-yellow-600/20 to-orange-600/20 border-l-4 border-yellow-500 p-4 rounded-2xl backdrop-blur-sm">
                        <div class="flex items-center gap-2 mb-1"><i class="fas fa-bullhorn text-yellow-400 text-xs"></i><span class="text-[9px] font-black text-yellow-400 uppercase">Admin Announcement</span></div>
                        <p class="text-sm text-white/90">${msgText.replace(/\n/g, '<br>')}</p>
                    </div>
                `;
                msgContainer.classList.remove('hidden');
            } else {
                msgContainer.classList.add('hidden');
            }
        });
    }

    function loadAppData() {
        onSnapshot(doc(db, "settings", "bank"), (d) => {
            if(d.exists()) {
                const data = d.data();
                document.getElementById('u-bank-name').innerText = data.name || "BANK";
                document.getElementById('u-bank-no').innerText = data.number || "000 000 0000";
                document.getElementById('u-bank-holder').innerText = data.holder || "HOLDER NAME";
                if(data.qr) document.getElementById('u-bank-qr-img').src = data.qr;
                if(data.logo) document.getElementById('u-bank-logo-icon').src = data.logo;
            }
        });
        onSnapshot(doc(db, "settings", "product_logos"), (docSnap) => {
            if(docSnap.exists()) {
                productLogos = docSnap.data();
                updateAllProductUI();
            }
        });
        onSnapshot(collection(db, "servers"), (snap) => {
            allServers = [];
            snap.forEach(d => allServers.push({id: d.id, ...d.data()}));
            updateAllProductUI();
        });
        onSnapshot(doc(db, "settings", "prices"), (docSnap) => {
            if(docSnap.exists()) {
                productPrices = { v2box: docSnap.data().v2box || 50, zivpn: docSnap.data().zivpn || 50, netmod: docSnap.data().netmod || 50 };
                updateAllProductUI();
            } else {
                setDoc(doc(db, "settings", "prices"), { v2box: 50, zivpn: 50, netmod: 50 });
            }
        });
        loadAdminMessage();
    }

    onAuthStateChanged(auth, async (user) => {
        const idLabel = document.getElementById('display-uid');
        const fixedID = await getDeviceID();
        if (user) {
            currentUser = { ...user, deviceId: fixedID };
            idLabel.innerText = "ID: " + fixedID;
            loadUserData(user.uid);
            loadAppData();
            setInterval(async () => { currentPing = await measurePing(); }, 5000);
            await measurePing();
        } else {
            await signInAnonymously(auth);
        }
    });

    window.initTabs = () => {
        const tabBtns = document.querySelectorAll('.tab-btn');
        const panes = document.querySelectorAll('.tab-pane');
        function activateTab(tabId) {
            panes.forEach(p => p.classList.add('hidden'));
            document.getElementById(`${tabId}-tab`).classList.remove('hidden');
            tabBtns.forEach(btn => {
                if(btn.getAttribute('data-tab') === tabId) {
                    btn.classList.add('bg-blue-600', 'text-white');
                    btn.classList.remove('bg-white/5', 'text-slate-400');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('bg-white/5', 'text-slate-400');
                }
            });
        }
        tabBtns.forEach(btn => btn.addEventListener('click', () => { const tab = btn.getAttribute('data-tab'); if(tab) activateTab(tab); }));
        activateTab('v2box');
    };
    setTimeout(() => { if(window.initTabs) window.initTabs(); }, 100);

    window.copyNumber = () => {
        const num = document.getElementById('u-bank-no').innerText.replace(/\s/g, '');
        navigator.clipboard.writeText(num);
        window.showSuccessModal("Account number copied!");
    };
    
    document.getElementById('manual-refresh-balance').addEventListener('click', manualRefreshBalance);
    document.getElementById('hard-refresh-btn').addEventListener('click', () => window.location.reload());
    document.getElementById('submit-topup-btn').addEventListener('click', window.submitTopup);
    document.getElementById('slip-file').addEventListener('change', window.handleFile);
</script>
</body>
</html>
