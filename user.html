<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="flex">
        <div class="w-64 bg-white h-screen p-4 shadow">
            <h2 class="text-xl font-bold">X-UI Panel</h2>
            <nav class="mt-4">
                <a href="#" onclick="showView('dashboard')" class="block py-2">Dashboard</a>
                <a href="#" onclick="showView('topup')" class="block py-2">TopUp</a>
                <a href="#" onclick="showView('contact')" class="block py-2">Contact</a>
                <a href="#" onclick="logout()" class="block py-2 text-red-600">Logout</a>
            </nav>
        </div>
        <div class="flex-1 p-6">
            <div id="dashboardView">
                <div class="bg-white p-4 rounded shadow mb-4">
                    <h2 class="text-xl font-bold">Balance: <span id="balance">0</span> MMK</h2>
                    <p>1 Month = 40 MMK | 200 GB | 30 Days</p>
                </div>
                <button onclick="createAccount()" class="bg-blue-500 text-white px-4 py-2 rounded mb-4">Create V2Ray Account (200GB/30d)</button>
                <div id="accountsList" class="bg-white p-4 rounded shadow"></div>
            </div>
            <div id="topupView" style="display:none">
                <div class="bg-white p-4 rounded shadow">
                    <h2 class="text-xl font-bold mb-4">Top Up</h2>
                    <div class="grid grid-cols-4 gap-2 mb-4">
                        <button onclick="setAmount(50)" class="bg-gray-300 py-2 rounded">50</button>
                        <button onclick="setAmount(100)" class="bg-gray-300 py-2 rounded">100</button>
                        <button onclick="setAmount(150)" class="bg-gray-300 py-2 rounded">150</button>
                        <button onclick="setAmount(200)" class="bg-gray-300 py-2 rounded">200</button>
                    </div>
                    <div id="bankInfo" class="mb-4"></div>
                    <input type="file" id="slipImage" accept="image/*" class="mb-2">
                    <button onclick="submitTopup()" class="bg-green-500 text-white w-full py-2 rounded">Submit Request</button>
                </div>
            </div>
            <div id="contactView" style="display:none">
                <div class="bg-white p-4 rounded shadow">
                    <h2 class="text-xl font-bold">Contact</h2>
                    <p>Telegram: @support_user</p>
                    <p>Email: admin@x-ui.com</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        const WORKER_URL = 'https://x-ui.linvpn2026.workers.dev';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        let selectedAmount = 50;

        async function fetchBalance() {
            const res = await fetch(`${WORKER_URL}/api/user/balance`, { headers: { 'Authorization': 'Bearer ' + token } });
            const data = await res.json();
            document.getElementById('balance').innerText = data.balance;
        }

        async function fetchAccounts() {
            const res = await fetch(`${WORKER_URL}/api/user/accounts`, { headers: { 'Authorization': 'Bearer ' + token } });
            const accounts = await res.json();
            const container = document.getElementById('accountsList');
            container.innerHTML = accounts.map(acc => `
                <div class="border-b py-2">
                    <p><strong>Email:</strong> ${acc.email}</p>
                    <p><strong>Total Flow:</strong> ${((acc.traffic?.total || 0) / 1073741824).toFixed(2)} GB / ${acc.totalGB} GB</p>
                    <p><strong>Expiry:</strong> ${new Date(acc.expiryTime * 1000).toLocaleDateString()}</p>
                    <button onclick="copyConfig('${JSON.stringify(acc.config)}')" class="text-blue-500">Copy Config</button>
                </div>
            `).join('');
        }

        async function createAccount() {
            await fetch(`${WORKER_URL}/api/user/create-account`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
            fetchAccounts();
        }

        function copyConfig(config) {
            navigator.clipboard.writeText(config);
            alert('Config copied');
        }

        async function loadBankInfo() {
            const res = await fetch(`${WORKER_URL}/api/admin/bank-info`);
            const info = await res.json();
            document.getElementById('bankInfo').innerHTML = `
                <p><strong>Bank:</strong> ${info.bankName}</p>
                <p><strong>Holder:</strong> ${info.holderName}</p>
                ${info.bankLogo ? `<img src="${info.bankLogo}" class="h-12">` : ''}
            `;
        }

        async function submitTopup() {
            const file = document.getElementById('slipImage').files[0];
            if (!file) return alert('Please upload slip');
            const reader = new FileReader();
            reader.onloadend = async () => {
                await fetch(`${WORKER_URL}/api/user/topup`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: selectedAmount, imageBase64: reader.result })
                });
                alert('Request submitted');
            };
            reader.readAsDataURL(file);
        }

        function setAmount(amt) { selectedAmount = amt; }

        function showView(view) {
            document.getElementById('dashboardView').style.display = view === 'dashboard' ? 'block' : 'none';
            document.getElementById('topupView').style.display = view === 'topup' ? 'block' : 'none';
            document.getElementById('contactView').style.display = view === 'contact' ? 'block' : 'none';
            if (view === 'dashboard') { fetchBalance(); fetchAccounts(); }
            if (view === 'topup') loadBankInfo();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        showView('dashboard');
    </script>
</body>
</html>
